<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="All-Star">
<meta name="theme-color" content="#eaf1fb">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>Richit's All-Star Field</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  :root{
    /* Phase 7 design system — soft neutral surface + restrained accents */
    --bg1:#f4f6f9; --bg2:#eef1f6; --ink:#1e293b; --muted:#64748b;
    --card:#ffffff; --soft:#f1f4f8; --line:#e4e8ef;
    --blue:#2f6fed; --blue2:#2459c4;            /* primary */
    --green:#1f9d57; --good:#1f9d57;            /* success */
    --amber:#dd9026;                            /* warning */
    --rose:#e0566e;                             /* error */
    /* secondary accents (used sparingly for tile/category coding) */
    --teal:#1aa8a0; --purple:#7a66cf; --pink:#e07da0; --sun:#e0a93a;
    --field:#2f8f4e; --field2:#26793f; --dirt:#c98a4b;
    --shadow:rgba(20,30,55,.08); --shadowS:rgba(20,30,55,.05);
    --r:12px;
  }
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);}
  body{background:var(--bg1);overflow:hidden;}
  #app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:780px;margin:0 auto;position:relative;}
  .screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 18px 60px;}
  .hidden{display:none!important;}

  .topbar{display:flex;align-items:center;gap:8px;padding:12px 16px 4px;}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-weight:800;
    box-shadow:0 2px 8px var(--shadowS);display:flex;align-items:center;gap:7px;font-size:16px;}
  .pill .ico{font-size:18px;}
  .spacer{flex:1;}
  .iconbtn{background:var(--card);border:1px solid var(--line);border-radius:50%;width:44px;height:44px;font-size:20px;
    box-shadow:0 2px 8px var(--shadowS);color:var(--ink);cursor:pointer;transition:transform .12s;}
  .iconbtn:active{transform:scale(.92);}

  h1{font-size:26px;font-weight:900;margin:8px 0 2px;text-align:center;letter-spacing:-.4px;}
  .sub{text-align:center;font-size:14.5px;color:var(--muted);margin-bottom:14px;}

  /* All-Star Field */
  #field{background:linear-gradient(160deg,#4aa85d,#2f7e41);border-radius:22px;padding:16px 16px 14px;color:#fff;
    box-shadow:0 12px 30px rgba(26,40,70,.22);margin-bottom:16px;position:relative;overflow:hidden;}
  .scoreRow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .scoreRow .lab{font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;opacity:.9;}
  .scoreBox{background:rgba(0,0,0,.22);border-radius:10px;padding:4px 12px;font-weight:900;font-size:18px;}
  .diamond{position:relative;width:170px;height:170px;margin:6px auto 2px;}
  .base{position:absolute;width:30px;height:30px;background:#fff;border-radius:7px;transform:rotate(45deg);
    box-shadow:0 2px 6px rgba(0,0,0,.25);border:2px solid #e7eef6;}
  .base.lit{background:var(--sun);border-color:#e0a72a;animation:pop .4s;}
  .base.home{background:#fff;}
  .base.home.lit{background:var(--sun);}
  #b1{right:0;top:50%;margin-top:-15px;} #b2{left:50%;top:0;margin-left:-15px;}
  #b3{left:0;top:50%;margin-top:-15px;} #bH{left:50%;bottom:0;margin-left:-15px;}
  .runner{position:absolute;font-size:24px;transition:all .5s ease;left:50%;bottom:-4px;margin-left:-14px;}
  .fieldNote{text-align:center;font-size:13px;opacity:.92;margin-top:8px;font-weight:700;}
  .team{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .team .mate{font-size:22px;background:rgba(255,255,255,.16);border-radius:10px;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;}

  /* Skill of the day */
  .wotd{display:block;width:100%;text-align:left;border:1px solid var(--line);cursor:pointer;
    background:linear-gradient(120deg,#eaf2ff,#eef9f2);border-radius:18px;padding:15px;margin-bottom:16px;box-shadow:0 2px 12px var(--shadowS);}
  .wotd .tag{font-size:11px;font-weight:900;color:var(--blue);letter-spacing:1px;text-transform:uppercase;}
  .wotd .row{display:flex;align-items:center;gap:14px;margin-top:8px;}
  .wotd .wic{font-size:40px;}
  .wotd .ww{font-size:30px;font-weight:900;}
  .wotd .wl{font-size:15px;color:var(--muted);font-weight:700;}
  .wotd .hear{margin-left:auto;font-size:20px;background:var(--ink);color:#fff;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}

  .sectionTitle{font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:18px 2px 10px;}
  .units{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
  .unit{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center;
    box-shadow:0 2px 10px var(--shadowS);cursor:pointer;transition:transform .12s;border-top:5px solid var(--blue);}
  .unit:active{transform:translateY(2px);}
  .unit.c-blue{border-top-color:var(--blue);} .unit.c-green{border-top-color:var(--green);}
  .unit.c-purple{border-top-color:var(--purple);} .unit.c-pink{border-top-color:var(--pink);}
  .unit.c-sun{border-top-color:var(--sun);} .unit.c-teal{border-top-color:var(--teal);}
  .unit .emoji{font-size:32px;display:block;margin-bottom:6px;}
  .unit .name{font-weight:800;font-size:13.5px;line-height:1.2;}
  .unit .prog{font-size:11px;color:var(--muted);margin-top:5px;font-weight:700;}
  .unit .bar{height:5px;background:var(--soft);border-radius:6px;margin-top:7px;overflow:hidden;}
  .unit .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--teal));width:0;border-radius:6px;transition:width .4s;}

  .actBtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:15px;margin-bottom:11px;box-shadow:0 2px 10px var(--shadowS);text-align:left;cursor:pointer;transition:transform .12s;}
  .actBtn:active{transform:translateY(2px);}
  .actBtn .big{font-size:26px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:13px;background:var(--soft);flex:0 0 auto;}
  .actBtn .t{font-weight:800;font-size:16px;}
  .actBtn .d{font-size:13px;color:var(--muted);font-weight:600;}

  .coach{display:flex;align-items:center;gap:12px;background:#eef5fd;border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:14px;}
  .coach .face{font-size:30px;}
  .coach .bubble{font-weight:800;font-size:15.5px;flex:1;line-height:1.3;}
  .coach .listen{border:none;background:var(--sun);color:#5a4410;font-weight:800;font-size:14px;padding:10px 13px;border-radius:13px;cursor:pointer;box-shadow:0 3px 0 #d39e2c;flex:0 0 auto;}
  .coach .listen:active{transform:translateY(2px);box-shadow:0 1px 0 #d39e2c;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px 20px;box-shadow:0 4px 18px var(--shadowS);text-align:center;margin-bottom:16px;}
  .bigEmoji{font-size:84px;line-height:1.1;margin:2px 0;}
  .bigword{font-size:46px;font-weight:900;letter-spacing:2px;margin:6px 0;}
  .label{font-size:18px;color:var(--purple);font-weight:800;margin-top:2px;}
  .scene{font-size:64px;line-height:1.1;margin:4px 0;}
  .storyText{font-size:21px;line-height:1.6;max-width:640px;margin:6px auto;font-weight:600;}
  .prompt{font-size:16px;font-weight:800;color:var(--muted);margin:4px 0 12px;text-align:center;}

  .speakBtn{background:var(--ink);color:#fff;border:none;border-radius:13px;padding:13px 22px;font-size:15px;font-weight:800;
    margin-top:14px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 3px 12px var(--shadowS);}
  .speakBtn:active{transform:scale(.97);}

  .sounds{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0 4px;}
  .sbtn{font-size:30px;font-weight:900;min-width:62px;padding:12px 8px;border-radius:14px;border:none;cursor:pointer;
    background:#eaf2fb;color:var(--blue2);box-shadow:0 4px 0 #cfe0f2;}
  .sbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #cfe0f2;}
  .sbtn.lit{background:var(--sun);color:#5a4410;box-shadow:0 4px 0 #d39e2c;}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .opt{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:18px 10px;font-size:40px;
    box-shadow:0 2px 8px var(--shadowS);cursor:pointer;transition:transform .12s,border-color .15s,background .15s;color:var(--ink);}
  .opt .lab{display:block;font-size:15px;font-weight:700;margin-top:6px;}
  .opt.txt{font-size:22px;font-weight:800;}
  .opt:active{transform:translateY(2px);}
  .opt.correct{border-color:var(--good);background:#eafaf1;}
  .opt.wrong{border-color:#f3b3b3;background:#fdf0f0;opacity:.7;}
  .opt.hint{border-color:var(--sun);box-shadow:0 0 0 4px rgba(243,183,59,.4);}

  .dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;background:#d2dbe8;}
  .dot.done{background:var(--good);} .dot.now{background:var(--blue);transform:scale(1.3);}

  .backBtn{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 15px;font-weight:700;font-size:14px;
    box-shadow:0 2px 8px var(--shadowS);display:inline-flex;align-items:center;gap:6px;color:var(--ink);cursor:pointer;}
  .footerBtn{width:100%;background:linear-gradient(90deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:14px;
    padding:16px;font-size:16px;font-weight:800;box-shadow:0 8px 20px rgba(63,127,224,.30);margin-top:6px;cursor:pointer;}
  .footerBtn:active{transform:translateY(2px);}
  .footerBtn.alt{background:linear-gradient(90deg,var(--green),var(--teal));box-shadow:0 8px 20px rgba(27,179,166,.28);}
  .encourage{font-size:17px;font-weight:800;color:var(--good);min-height:24px;margin-top:10px;text-align:center;}

  /* record controls */
  .recRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
  .recBtn{border:none;border-radius:13px;padding:13px 18px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px var(--shadowS);display:inline-flex;align-items:center;gap:8px;}
  .recBtn.rec{background:#ef5b6b;color:#fff;} .recBtn.rec.on{animation:pulse 1s infinite;}
  .recBtn.play{background:var(--green);color:#fff;} .recBtn.play:disabled{opacity:.4;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,91,107,.5)}50%{box-shadow:0 0 0 10px rgba(239,91,107,0)}}

  /* overlay */
  .overlay{position:fixed;inset:0;background:rgba(18,28,48,.46);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .rewardCard{background:var(--card);border-radius:22px;padding:30px;text-align:center;max-width:370px;width:100%;box-shadow:0 24px 60px rgba(18,28,48,.4);animation:pop .4s;}
  .rewardCard .grow{font-size:78px;animation:bounce 1.4s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
  .rewardCard h2{font-size:23px;font-weight:900;margin:8px 0;}
  .confetti{position:fixed;top:-10px;font-size:22px;z-index:60;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-weight:700;z-index:70;font-size:14px;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .breathe{width:160px;height:160px;border-radius:50%;margin:18px auto;background:radial-gradient(circle,#bfe3ff,#7fb8ec);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#23527c;animation:breathe 8s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(.65)}50%{transform:scale(1.1)}}

  /* parent */
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px var(--shadowS);margin-bottom:14px;}
  .statRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stat{background:var(--soft);border-radius:13px;padding:14px;text-align:center;}
  .stat .n{font-size:26px;font-weight:900;color:var(--blue);}
  .stat .l{font-size:12px;font-weight:700;color:var(--muted);}
  table{width:100%;border-collapse:collapse;margin-top:6px;font-size:14px;}
  th,td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
  .pbar{height:12px;background:var(--soft);border-radius:7px;overflow:hidden;}
  .pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--teal));}
  .cal{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
  .cal .day{width:30px;text-align:center;}
  .cal .box{height:28px;border-radius:8px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .cal .box.on{background:#d6f0e0;}
  .cal .dl{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .chip{background:var(--soft);border-radius:999px;padding:6px 11px;font-size:13px;font-weight:700;}
  .vrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .vbtn{padding:9px 13px;border-radius:12px;border:2px solid var(--line);background:#fff;cursor:pointer;font-weight:700;font-size:13px;}
  .vbtn.on{border-color:var(--blue);background:#eaf2fb;}
  .note{font-size:13.5px;color:var(--muted);line-height:1.55;font-weight:600;}

  /* ===== v2: landing + iPad layout (minimal scroll) ===== */
  #app{max-width:940px;}
  .screen{padding:8px 20px 20px;}

  #landingScreen{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(130% 90% at 50% -8%,#5aa0e6 0%,#3f7fe0 46%,#2f63b8 100%);color:#fff;text-align:center;padding:24px;}
  .landingInner{max-width:540px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .landingBadge{width:148px;height:148px;border-radius:38px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;
    font-size:82px;box-shadow:0 18px 44px rgba(0,0,0,.28);margin-bottom:6px;animation:bounce 2.2s ease-in-out infinite;}
  .landingTitle{color:#fff;font-size:44px;line-height:1.04;margin:6px 0 0;text-shadow:0 3px 14px rgba(0,0,0,.22);}
  .landingTag{font-size:17px;font-weight:700;opacity:.95;margin-bottom:16px;}
  .playBtn{background:#fff;color:#2f63b8;border:none;border-radius:18px;padding:18px 44px;font-size:23px;font-weight:900;cursor:pointer;
    box-shadow:0 8px 0 rgba(0,0,0,.16);transition:transform .1s,box-shadow .1s;}
  .playBtn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,.16);}
  .grownBtn{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:14px;padding:11px 18px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
  .grownBtn:active{transform:scale(.96);}

  .homeHero{display:flex;gap:14px;align-items:stretch;margin-bottom:6px;}
  .homeHero #field{flex:1;margin-bottom:0;}
  .homeHero .wotd{flex:0 0 38%;margin-bottom:0;display:flex;flex-direction:column;justify-content:center;}
  @media (max-width:640px){ .homeHero{flex-direction:column;} .homeHero .wotd{flex:auto;} }

  #field{padding:12px 14px;}
  .diamond{width:118px;height:118px;margin:2px auto 0;}
  .base{width:24px;height:24px;}
  #b1{margin-top:-12px;} #b3{margin-top:-12px;} #b2{margin-left:-12px;} #bH{margin-left:-12px;}
  .runner{font-size:20px;margin-left:-11px;}
  .fieldNote{margin-top:6px;}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;border:2px solid var(--line);background:var(--card);border-radius:999px;padding:11px 18px;font-weight:800;font-size:15.5px;
    color:var(--muted);cursor:pointer;box-shadow:0 2px 8px var(--shadowS);transition:transform .1s;}
  .tab:active{transform:scale(.96);}
  .tab.on{background:var(--blue);border-color:var(--blue);color:#fff;}

  #sections.units{grid-template-columns:repeat(2,1fr);}
  @media (min-width:560px){ #sections.units{grid-template-columns:repeat(3,1fr);} }
  @media (min-width:760px){ #sections.units{grid-template-columns:repeat(4,1fr);} }
  .unit{padding:18px 10px;}
  .unit .emoji{font-size:38px;}
  .unit .name{font-size:15px;}

  /* center activity content so short activities don't sit at the very top on iPad */
  #actBody{max-width:680px;margin:0 auto;}

  /* ===== Math ===== */
  .mathEq{font-size:30px;font-weight:900;margin:2px 0 10px;letter-spacing:1px;}
  .mathEq.big{font-size:42px;margin-bottom:16px;}
  .mathEq .qm{color:var(--blue);}
  .counters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;margin:8px auto 6px;max-width:540px;}
  .counters.small{transform:scale(.8);margin:0 auto;}
  .counter{width:34px;height:50px;border-radius:9px;border:none;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.14);transition:transform .12s,opacity .2s;}
  .counter.g1{background:linear-gradient(160deg,#5aa0e6,#3f7fe0);}
  .counter.g2{background:linear-gradient(160deg,#6cc96c,#48b463);}
  .counter:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.14);}
  .counter.counted{outline:4px solid var(--sun);outline-offset:2px;transform:translateY(-4px) scale(1.06);}
  .counter.gone{opacity:.28;transform:scale(.8) rotate(8deg);box-shadow:none;position:relative;}
  .counter.gone::after{content:"✕";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#b23;font-size:24px;font-weight:900;}
  .plusSign{font-size:30px;font-weight:900;color:var(--muted);padding:0 4px;}
  .countTotal{font-size:24px;font-weight:900;color:var(--ink);margin:6px 0;}
  .btnMini{border:none;background:var(--soft);color:var(--ink);font-weight:800;font-size:14px;padding:10px 16px;border-radius:13px;cursor:pointer;box-shadow:0 2px 8px var(--shadowS);margin-bottom:8px;}
  .btnMini:active{transform:translateY(2px);}
  .numChoices{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
  .numBtn{min-width:78px;font-size:30px;font-weight:900;padding:16px 10px;border-radius:16px;border:3px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;box-shadow:0 3px 10px var(--shadowS);transition:transform .1s;}
  .numBtn:active{transform:translateY(2px);}
  .numBtn.correct{border-color:var(--good);background:#eafaf1;}
  .numBtn.wrong{border-color:#f3b3b3;background:#fdf0f0;opacity:.7;}

  .numline{display:flex;overflow-x:auto;gap:0;padding:6px 4px 2px;justify-content:flex-start;-webkit-overflow-scrolling:touch;}
  .nlcell{flex:0 0 auto;width:38px;text-align:center;}
  .nlmark{height:26px;font-size:22px;line-height:26px;}
  .nltick{height:14px;border-left:2px solid var(--line);width:0;margin:0 auto;}
  .nlnum{font-size:15px;font-weight:800;color:var(--muted);margin-top:2px;}
  .nlcell.here .nlnum{color:var(--blue);font-size:18px;}
  .nlcell.here .nltick{border-color:var(--blue);}

  /* ===== Math v2: levels, base-ten, tally ===== */
  .lvlChooser{display:flex;gap:10px;margin-bottom:14px;}
  .lvlBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:13px 8px;border-radius:15px;border:2px solid var(--line);
    background:#fff;font-weight:900;font-size:16px;color:var(--ink);cursor:pointer;box-shadow:0 2px 8px var(--shadowS);}
  .lvlBtn small{font-weight:700;font-size:11px;color:var(--muted);}
  .lvlBtn.on{border-color:var(--blue);background:#eaf2fb;}
  .lvlBtn.locked{opacity:.65;}
  .hopBtns{display:flex;flex-direction:column;}

  .counters.bt{gap:16px;align-items:flex-end;}
  .btgroup{display:inline-flex;flex-wrap:wrap;gap:6px;align-items:flex-end;justify-content:center;padding:6px 8px;border-radius:12px;background:rgba(0,0,0,.03);max-width:240px;}
  .rod{width:16px;height:58px;border-radius:5px;border:none;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.14);}
  .one{width:18px;height:18px;border-radius:5px;border:none;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .rod.g1,.one.g1{background:linear-gradient(160deg,#5aa0e6,#3f7fe0);}
  .rod.g2,.one.g2{background:linear-gradient(160deg,#6cc96c,#48b463);}
  .rod.counted,.one.counted{outline:4px solid var(--sun);outline-offset:2px;}
  .rod.gone,.one.gone{opacity:.28;transform:scale(.85) rotate(6deg);box-shadow:none;}

  .tallies{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:center;margin:12px auto 8px;max-width:560px;}
  .tgroup{position:relative;display:inline-flex;gap:5px;padding:2px 4px;}
  .tmark{width:5px;height:38px;border-radius:3px;background:var(--blue);}
  .tmark.g2{background:var(--green);}
  .tslash{position:absolute;top:14px;left:-2px;width:calc(100% + 4px);height:5px;border-radius:3px;background:var(--blue);transform:rotate(-20deg);}
  .tslash.g2{background:var(--green);}
  .tmark.gone,.tslash.gone{background:#d9514e;opacity:.45;}
  .tzero{font-size:24px;font-weight:900;color:var(--muted);}

  /* ===== operation recognition + consistent add/subtract coding ===== */
  :root{ --orange:#e8913a; }
  .unit.c-orange{border-top-color:var(--orange);}
  .opsign{font-weight:900;}
  .opsign.add{color:var(--green);}
  .opsign.sub{color:var(--orange);}
  .opChoices{display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
  .opBtn{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:150px;padding:20px 14px;border-radius:18px;border:3px solid var(--line);
    background:#fff;font-weight:900;font-size:18px;color:var(--ink);cursor:pointer;box-shadow:0 3px 10px var(--shadowS);transition:transform .1s;}
  .opBtn:active{transform:translateY(2px);}
  .opBtn .opIc{font-size:40px;}
  .opBtn.opAdd{border-color:#bfe6c8;} .opBtn.opAdd .opIc{color:var(--green);}
  .opBtn.opSub{border-color:#f3d6b3;} .opBtn.opSub .opIc{color:var(--orange);}
  .opBtn.correct{border-color:var(--good);background:#eafaf1;}
  .opBtn.wrong{border-color:#f3b3b3;background:#fdf0f0;opacity:.7;}
  .numBtn.hintReveal{border-color:var(--good);background:#eafaf1;box-shadow:0 0 0 4px rgba(28,158,87,.35);animation:pop .4s;}

  /* visible focus for keyboard / switch access */
  button:focus-visible, .choice:focus-visible, .tile:focus-visible, .unit:focus-visible, .opt:focus-visible{
    outline:4px solid #1f6fe0; outline-offset:3px; }

  /* ===== batch 2: plan, break, AAC, sensory ===== */
  .planBtn{background:rgba(255,255,255,.92);color:#2f63b8;border:none;border-radius:16px;padding:13px 26px;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.14);margin-top:10px;}
  .planBtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.14);}
  .planBar{background:#fff4d6;border:1px solid #f0d98a;border-radius:12px;padding:8px 12px;font-weight:800;font-size:14px;color:#7a5a10;text-align:center;margin-top:8px;}
  .breakFab{position:fixed;bottom:18px;right:18px;z-index:35;background:#7fb8ec;color:#0b2e52;border:none;border-radius:999px;padding:14px 20px;font-size:16px;font-weight:900;box-shadow:0 6px 18px rgba(26,40,70,.3);cursor:pointer;}
  .breakFab:active{transform:scale(.95);}
  .aacGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:8px;}
  .aacBtn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 10px;border-radius:18px;border:2px solid var(--line);background:#fff;font-weight:800;font-size:15px;color:var(--ink);cursor:pointer;box-shadow:0 2px 10px var(--shadowS);min-height:104px;justify-content:center;text-align:center;}
  .aacBtn:active{transform:translateY(2px);}
  .aacBtn .aacIc{font-size:34px;}
  .overlay.calm{background:rgba(18,28,48,.3);backdrop-filter:none;}
  .overlay.calm .rewardCard{animation:none;}
  .overlay.calm .grow{animation:none;}
  body.reduce-motion *{animation:none !important; transition:none !important;}
  body.reduce-motion .confetti{display:none !important;}

  /* ===== Phase 7: professional design system ===== */
  /* consistent, calmer radii */
  .card,.pcard,.panel,.rewardCard{border-radius:var(--r);}
  .unit,.opt,.numBtn,.aacBtn,.actBtn,.wotd,.btnMini,.tab,.lvlBtn,.opBtn,.footerBtn,.playBtn,.planBtn,.speakBtn,.btn,.iconbtn,.backBtn,.listen,.recBtn,.vbtn{border-radius:10px;}
  /* flatter, calmer surfaces (minimal gradients) */
  #landingScreen{background:var(--blue);}
  .landingBadge{background:rgba(255,255,255,.16);box-shadow:none;}
  .landingTitle{text-shadow:none;}
  .playBtn{box-shadow:0 4px 0 rgba(0,0,0,.12);}
  #field{background:var(--field);box-shadow:0 6px 20px var(--shadow);}
  .wotd{background:var(--soft);}
  .unit{border-top-width:4px;}
  .tab.on{background:var(--blue);border-color:var(--blue);}
  /* softer, single-elevation shadows everywhere */
  .pill,.iconbtn,.unit,.actBtn,.card,.pcard{box-shadow:0 1px 3px var(--shadowS);}

  /* High-contrast mode */
  body.high-contrast{--ink:#0a0f1c;--muted:#1f2a3d;--line:#0a0f1c;--bg1:#ffffff;--bg2:#ffffff;--soft:#eef1f6;}
  body.high-contrast .card,body.high-contrast .pcard,body.high-contrast .panel,body.high-contrast .unit,
  body.high-contrast .opt,body.high-contrast .numBtn,body.high-contrast .aacBtn,body.high-contrast .actBtn,
  body.high-contrast .pill,body.high-contrast .iconbtn,body.high-contrast .tab,body.high-contrast .coach,
  body.high-contrast .opBtn,body.high-contrast .lvlBtn,body.high-contrast .vbtn{border:2px solid #0a0f1c !important;box-shadow:none !important;}
  body.high-contrast .coach,body.high-contrast .wotd{background:#fff;}
  body.high-contrast .muted,body.high-contrast .note,body.high-contrast .sub{color:#1f2a3d;}

  /* Larger-text mode */
  body.big-text .coach .bubble{font-size:18.5px;}
  body.big-text .storyText{font-size:24px;}
  body.big-text .opt,body.big-text .opt.txt{font-size:24px;}
  body.big-text .numBtn{font-size:34px;}
  body.big-text .unit .name{font-size:17px;}
  body.big-text .mathEq{font-size:34px;}
  body.big-text .mathEq.big{font-size:46px;}
  body.big-text .prompt{font-size:18px;}
  body.big-text .aacBtn,body.big-text .tab,body.big-text .actBtn .t{font-size:17px;}
  body.big-text .sub{font-size:16px;}

  /* ===== Phase 3/4 activities ===== */
  .nsObjs{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:10px auto;max-width:520px;}
  .nsObj{font-size:34px;background:#fff;border:2px solid var(--line);border-radius:12px;width:56px;height:56px;cursor:pointer;line-height:1;}
  .nsObj.counted{outline:4px solid var(--sun);outline-offset:2px;background:#fff8ec;}
  .nsCompare{display:flex;gap:14px;margin:6px 0;}
  .nsSide{flex:1;border:2px solid var(--line);border-radius:12px;padding:12px;min-height:96px;display:flex;align-items:center;justify-content:center;}
  .nsGroup{font-size:28px;line-height:1.35;word-break:break-word;text-align:center;}
  .gateBar{display:flex;gap:6px;justify-content:center;margin:0 0 12px;}
  .gateBar span{width:38px;height:7px;border-radius:6px;background:var(--line);}
  .gateBar span.done{background:var(--good);}
  .gateBar span.now{background:var(--blue);}
  .decSentence{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0 4px;}
  .decWord{font-size:24px;font-weight:800;color:var(--ink);background:var(--soft);border:2px solid var(--line);border-radius:10px;padding:6px 12px;cursor:pointer;}
  .decWord:active{transform:translateY(2px);background:#e8eef6;}
</style>
</head>
<body>
<div id="app">
  <!-- LANDING -->
  <div id="landingScreen">
    <div class="landingInner">
      <div class="landingBadge">⚾</div>
      <h1 class="landingTitle">Richit's<br>All-Star Field</h1>
      <div class="landingTag">Read a little · score a run · fill your field ⭐</div>
      <button class="playBtn" id="startBtn">▶️ Let's Play!</button>
      <button class="planBtn" id="startPlan">📋 Today's Plan (10 min)</button>
      <button class="grownBtn" id="landingParent">👪 For grown-ups</button>
    </div>
  </div>

  <div class="topbar hidden" id="topbar">
    <div class="pill"><span class="ico">⭐</span><span id="starCount">0</span></div>
    <div class="pill"><span class="ico">⚾</span><span id="runCount">0</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="parentBtn" title="grown-ups" aria-label="For grown-ups">👪</button>
    <button class="iconbtn" id="muteBtn" title="sound" aria-label="Sound on or off">🔊</button>
  </div>

  <!-- HOME -->
  <div class="screen" id="homeScreen">
    <div class="homeHero">
      <div id="field">
        <div class="scoreRow"><span class="lab">⚾ Scoreboard</span><span class="scoreBox" id="scoreBox">0 runs</span></div>
        <div class="diamond">
          <div class="base" id="b2"></div><div class="base" id="b1"></div>
          <div class="base" id="b3"></div><div class="base home" id="bH"></div>
          <div class="runner" id="runner">🧢</div>
        </div>
        <div class="fieldNote" id="fieldNote">Play a game to start running the bases! 🏃</div>

  <!-- TOPIC MENU -->
  <div class="screen hidden" id="menuScreen">
    <button class="backBtn" id="menuBack">⬅️ Field</button>
    <h1 id="menuTitle" style="margin-top:10px;"></h1>

  <!-- ACTIVITY -->
  <div class="screen hidden" id="actScreen">

  </div>

  <!-- PARENT -->
  <div class="screen hidden" id="parentScreen">
    <button class="backBtn" id="parentBack">⬅️ Field</button>
    <h1 style="margin-top:10px;">Parent Dashboard</h1>
    <div class="sub">Progress for Richit — for your eyes & IEP notes</div>
    <div id="parentBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="curriculum.js"></script>
<script src="scoring.js"></script>
<script src="adaptive.js"></script>

<script>
/* ===================== STATE ===================== */
const SAVE_KEY="richitAllStar_v1";
let state=loadState(), muted=false, currentTopic=null, lesson=null;
function loadState(){ try{const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s) return Object.assign(base(),s);}catch(e){} return base(); }
function base(){ return {stars:0, runs:0, basePos:0, team:[], done:{}, log:{}, seen:{}, stats:{}, voice:null, mathLevel:{add:1,sub:1}, mlc:{}, mathUnlock:{}, errpat:{}, hints:{}, replays:0, opStat:{}, settings:{}, skills:{}, flags:{}}; }
function saveState(){ try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){} }

/* ===================== SPEECH ===================== */
let enVoice=null;
/** Rank voices so we default to the most natural one available on the device. */
function voiceRank(v){
  const n=(v.name||"").toLowerCase(), l=(v.lang||"").toLowerCase(); let s=0;
  if(/google/.test(n)) s+=6;                                   // Chrome/Android neural
  if(/natural|neural|premium|enhanced/.test(n)) s+=6;          // iOS/Edge enhanced
  if(/samantha|siri|ava|allison|nicky|aaron|tom|evan|joelle/.test(n)) s+=4; // good Apple voices
  if(v.localService===false) s+=2;                             // network/neural voices
  if(/en[-_]us/.test(l)) s+=2; else if(/^en/.test(l)) s+=1;
  if(/compact|fred|albert|zarvox|eloquence|espeak/.test(n)) s-=4; // known robotic
  return s;
}
function pickVoice(){
  if(!('speechSynthesis'in window))return;
  const vs=speechSynthesis.getVoices();
  if(state.voice){ const v=vs.find(v=>v.name===state.voice); if(v){enVoice=v;return;} }
  const en=vs.filter(v=>/^en/i.test(v.lang||""));
  enVoice=(en.length?en:vs).slice().sort((a,b)=>voiceRank(b)-voiceRank(a))[0]||null;
}
function bestEnglishVoices(){
  if(!('speechSynthesis'in window))return [];
  return speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang||"")).sort((a,b)=>voiceRank(b)-voiceRank(a));
}
if('speechSynthesis'in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }

let speakToken=0;
/** Speak naturally: one sentence per utterance, with a real pause after each. */
function speak(text,opts){
  opts=opts||{};
  if(muted||!('speechSynthesis'in window)||!text)return;
  const myTok=++speakToken;
  try{ speechSynthesis.cancel(); }catch(e){}
  const st=state.settings||{};
  const baseRate = opts.rate || (st.slowSpeech?0.72 : (st.quiet?0.82 : 0.86));
  const vol = st.quiet?0.65:1;
  // split into sentence-ish chunks, keeping the trailing punctuation
  let parts;
  try{ parts=String(text).split(/(?<=[.?!…])\s+/); }catch(e){ parts=String(text).split(/([.?!…])\s+/); }
  parts=parts.map(s=>s.trim()).filter(Boolean);
  let i=0;
  const sayNext=()=>{
    if(myTok!==speakToken || i>=parts.length) return;
    let u; try{ u=new SpeechSynthesisUtterance(parts[i]); }catch(e){ return; }
    u.lang="en-US"; if(enVoice)u.voice=enVoice; u.rate=baseRate; u.pitch=opts.pitch||1.0; u.volume=vol;
    const hardStop=/[.?!…]$/.test(parts[i]);
    u.onend=()=>{ if(myTok!==speakToken)return; i++; if(i<parts.length) setTimeout(sayNext, hardStop?360:160); };
    u.onerror=()=>{ if(myTok!==speakToken)return; i++; if(i<parts.length) setTimeout(sayNext, 200); };
    try{ speechSynthesis.speak(u); }catch(e){}
  };
  sayNext();
}
function stopSpeak(){ speakToken++; if('speechSynthesis'in window){ try{speechSynthesis.cancel();}catch(e){} } }
/* phoneme approximations so letter sounds are read, not letter names */
const PH={a:"aah",e:"eh",i:"ih",o:"awe",u:"uh",b:"buh",c:"kuh",d:"duh",f:"fff",g:"guh",h:"huh",
  j:"juh",k:"kuh",l:"lll",m:"mmm",n:"nnn",p:"puh",q:"kwuh",r:"rrr",s:"sss",t:"tuh",v:"vvv",
  w:"wuh",x:"ks",y:"yuh",z:"zzz",sh:"shh",ch:"chuh",th:"th",ll:"lll",ck:"kuh",ee:"eee",
  air:"air",ar:"ar",ai:"ay",oo:"oo",mb:"mmm",se:"ss",ss:"sss",fr:"fr",fl:"fl",cl:"cl",cr:"cr",
  dr:"dr",st:"st",gl:"gl",sn:"sn",tr:"tr",sw:"sw",pl:"pl"};
function phon(s){ return PH[s.toLowerCase()]||s; }

/* ===================== HELPERS ===================== */
const $=id=>document.getElementById(id);
const elc=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
function show(s){ ["homeScreen","menuScreen","actScreen","parentScreen"].forEach(x=>$(x).classList.add("hidden")); $(s).classList.remove("hidden"); $(s).scrollTop=0;
  const fab=$("breakFab"); if(fab){ const showFab = s==="actScreen" && (!state.settings || state.settings.breakBtn!==false); fab.classList.toggle("hidden", !showFab); } }
function applySettings(){
  const s=state.settings||{};
  document.body.classList.toggle("reduce-motion", !!s.reduceMotion);
  document.body.classList.toggle("high-contrast", !!s.highContrast);
  document.body.classList.toggle("big-text", !!s.bigText);
}
function openBreak(){ stopSpeak();
  const ov=elc("div","overlay"); ov.innerHTML=`<div class="rewardCard"><div class="breathe">Breathe…</div>
    <div style="font-weight:800;font-size:16px;margin-top:4px">In… and out…</div>
    <button class="footerBtn" style="margin-top:16px" id="brDone">I feel calm 😌</button></div>`;
  document.body.appendChild(ov); speak("Let's take a break. Breathe in. And out.",{rate:.78});
  ov.querySelector("#brDone").onclick=()=>{ ov.remove(); }; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1500); }
function todayKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function cheer(){ return CHEERS[Math.floor(Math.random()*CHEERS.length)]; }
function logDay(){ const k=todayKey(); state.log[k]=(state.log[k]||0)+1; }
function markSeen(label){ if(label) state.seen[label]=1; }
function bumpStat(id,correct){ const s=state.stats[id]||(state.stats[id]={a:0,c:0,sess:0}); s.a++; if(correct)s.c++; }

/* ===================== REWARD / FIELD ===================== */
function addStars(n){
  state.stars+=n;
  for(let i=0;i<n;i++){ state.basePos++; if(state.basePos>=4){ state.basePos=0; scoreRun(); } }
  saveState(); renderTop();
}
function scoreRun(){ state.runs++; const t=TEAM[(state.runs-1)%TEAM.length]; state.team.push(t); }
function renderTop(){ $("starCount").textContent=state.stars; $("runCount").textContent=state.runs; }
function renderField(){
  $("scoreBox").textContent=state.runs+(state.runs===1?" run":" runs");
  const bases=["b1","b2","b3","bH"];
  bases.forEach((b,i)=>$(b).classList.toggle("lit", i<state.basePos));
  // runner position along the path
  const pos=[{l:"100%",b:"50%"},{l:"50%",b:"100%"},{l:"0%",b:"50%"},{l:"50%",b:"0%"}];
  const p=pos[Math.min(state.basePos, 3)] || pos[0];
  const r=$("runner");
  if(state.basePos===0){ r.style.left="50%"; r.style.bottom="-4px"; }
  else { r.style.left=p.l; r.style.bottom=p.b; }
  $("fieldNote").textContent = state.runs===0 && state.basePos===0
    ? "Play a game to start running the bases! 🏃"
    : `${state.basePos}/4 to your next run — ${state.runs} scored! ⚾`;
  const tr=$("teamRow"); tr.innerHTML="";
  state.team.slice(-12).forEach(m=>{ const d=elc("div","mate"); d.textContent=m; tr.appendChild(d); });
}

/* ===================== SKILL OF THE DAY ===================== */
const ALL_PHON = TOPICS.filter(t=>t.type==="phonics").reduce((a,t)=>a.concat(t.items.map(w=>({w:w.word,ic:w.ic||"⭐",lab:w.label||""}))),[]);
function renderWOTD(){
  const day=Math.floor((Date.now()-new Date().getTimezoneOffset()*6e4)/864e5);
  const w=ALL_PHON[day%ALL_PHON.length];
  const e=$("wotd");
  e.innerHTML=`<div class="tag">🌅 Word of the Day</div>
    <div class="row"><span class="wic">${w.ic}</span>
    <span><span class="ww">${w.w}</span><br><span class="wl">${w.lab||"say it out loud"}</span></span>
    <span class="hear">🔊</span></div>`;
  e.onclick=()=>speak(w.w);
}

/* ===================== HOME ===================== */
function topicCount(t){ return t.items ? t.items.length : (t.count||6); }
function topicProgress(t){
  const s=state.stats[t.id]||{a:0,c:0};
  const target=topicCount(t);
  const done=Math.min(target, s.c);
  return Math.round(done/target*100);
}
const SECTIONS=[
  {key:"reading", label:"📖 Reading", ids:["letters","rhyme","syllables","cvc_a","cvc_e","cvc_i","cvc_o","cvc_u","minpairs","digraphs","blends","sight1","sight2","decodable","stories","sequence"]},
  {key:"math", label:"🔢 Math", ids:["ns_count","ns_numeral","ns_compare","add","sub","wordclue","wordprob"]},
  {key:"talking", label:"💬 Talking", ids:["comm_want","comm_comment","comm_problem","comm_social","directions"]},
  {key:"feelings", label:"😊 Feelings", ids:["feelings"]},
  {key:"convos", label:"🎭 Conversations", scripts:true},
];
let activeSection="reading";
function renderTabs(){
  const tb=$("tabBar"); tb.innerHTML="";
  SECTIONS.forEach(s=>{
    const b=elc("button","tab"+(s.key===activeSection?" on":""));
    b.textContent=s.label;
    b.onclick=()=>{ activeSection=s.key; renderTabs(); renderTiles(); $("homeScreen").scrollTop=0; };
    tb.appendChild(b);
  });
}
function renderTiles(){
  const wrap=$("sections"); wrap.innerHTML="";
  const sec=SECTIONS.find(s=>s.key===activeSection)||SECTIONS[0];
  if(sec.scripts){
    SCRIPTS.forEach(sc=>{
      const b=elc("button","unit c-sun"); b.onclick=()=>playScript(sc.id);
      const done=state.done["script_"+sc.id]?'<div class="prog">⭐ Practiced</div>':'<div class="prog">Act it out</div>';
      b.innerHTML=`<span class="emoji">${sc.emoji}</span><span class="name">${sc.name}</span>${done}`;
      wrap.appendChild(b);
    });
  } else {
    sec.ids.forEach(id=>{

/* ===================== ACTIVITY ENGINE ===================== */
function startActivity(id,kind,len){
  const t=TOPICS.find(x=>x.id===id);
  const lvl = t.type==="math" ? (state.mathLevel[id]||1) : 1;
  let items = t.type==="math"
    ? Array.from({length:t.count||10},()=>genMath(t.op,lvl))
    : t.type==="ns"
    ? Array.from({length:t.count||8},()=>genNS(t.mode))
    : shuffle(t.items);
  if(len) items = items.slice(0,len);
  lesson={id,kind,type:t.type,items,idx:0,correct:0,topic:t,level:lvl};
  const s=state.stats[id]||(state.stats[id]={a:0,c:0,sess:0}); s.sess++; saveState();
  const pb=$("planBar");
  if(pb){ if(plan){ pb.textContent=`📋 Step ${plan.i+1} of ${plan.steps.length}  →  then ⚾`; pb.classList.remove("hidden"); } else pb.classList.add("hidden"); }
  renderDots(); renderStep(); show("actScreen");
}
function renderDots(){
  const d=$("dots"); d.innerHTML="";
  lesson.items.forEach((_,i)=>{ const s=elc("div","dot"+(i<lesson.idx?" done":i===lesson.idx?" now":"")); d.appendChild(s); });
}
function nextStep(){
  lesson.idx++;
  if(lesson.idx>=lesson.items.length){ return finishActivity(); }
  renderDots(); renderStep();
}
/* ---- adaptive instrumentation: prompt level + per-item logging ---- */
function itemPromptLevel(){
  if(lesson._revealed) return "modeled";
  if((lesson._wrong||0)>=1) return "visual";
  if(lesson._replayed) return "replay";
  return "independent";
}
function logSkillResolved(){
  if(typeof skillForActivity!=="function") return;
  const sk=skillForActivity(lesson.id, lesson.level);
  if(!sk || sk.ungraded) return;
  const pl=itemPromptLevel();
  const mis=(lesson._mis||[]).slice();
  if(pl==="modeled") mis.push("neededAnswerReveal");
  else if(lesson._replayed && pl!=="independent") mis.push("neededAudioReplay");
  if((lesson.kind==="sticks"||lesson.kind==="tally") && !lesson._acted && (lesson._wrong||0)>0) mis.push("guessedWithoutModel");
  recordItem(sk.skillId, {format:lesson.kind, promptLevel:pl, misconceptions:mis});
}
function renderStep(){
  lesson._wrong=0; lesson._mis=[]; lesson._replayed=false; lesson._acted=false; lesson._revealed=false;
  const k=lesson.kind;
  if(lesson.type==="phonics"){ k==="learn"?rLearnPhon():k==="find"?rFindPhon():rSay(phonItemText()); }
  else if(lesson.type==="comm"){ k==="learn"?rLearnComm():k==="choose"?rChooseComm():rSay(lesson.items[lesson.idx].say); }
  else if(lesson.type==="read"){ rRead(); }
  else if(lesson.type==="directions"){ rDirections(); }
  else if(lesson.type==="feelings"){ rFeelings(); }
  else if(lesson.type==="math"){ renderMath(); }
  else if(lesson.type==="wordclue"){ rWordClue(lesson.items[lesson.idx]); }
  else if(lesson.type==="ns"){ rNumberSense(lesson.items[lesson.idx]); }
  else if(lesson.type==="wordproblem"){ rWordProblem(lesson.items[lesson.idx], 0); }
  else if(lesson.type==="rhyme"){ rRhyme(lesson.items[lesson.idx]); }
  else if(lesson.type==="syllable"){ rSyllable(lesson.items[lesson.idx]); }
  else if(lesson.type==="minpair"){ rMinPair(lesson.items[lesson.idx]); }
  else if(lesson.type==="sequence"){ rSequence(lesson.items[lesson.idx], 0); }
  else if(lesson.type==="decodable"){ rDecodable(lesson.items[lesson.idx]); }
}

function rLearnPhon(){
  const w=lesson.items[lesson.idx], body=$("actBody");
  if(w.sight){
    body.innerHTML=coachHTML("Look and listen. This word is &ldquo;"+w.word+"&rdquo;.")+

    bindListen(()=>speak("This word is "+w.word));
    speak("This word is "+w.word);
  } else if(lesson.topic && lesson.topic.sub==="letter"){
    // SAY = single-beat spoken cue (no repeated letters); shown as clean /x/ slash notation.
    const SAY={a:"aah",e:"eh",i:"ih",o:"awe",u:"uh",b:"buh",c:"kuh",d:"duh",f:"fuh",g:"guh",h:"huh",j:"juh",k:"kuh",l:"luh",m:"muh",n:"nuh",p:"puh",q:"kwuh",r:"ruh",s:"suh",t:"tuh",v:"vuh",w:"wuh",x:"ks",y:"yuh",z:"zuh"};
    const L=w.word.toUpperCase(), disp="/"+w.word.toLowerCase()+"/", say=SAY[w.sounds[0].toLowerCase()]||phon(w.sounds[0]);
    const cap=s=> s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
    const coachDisp = w.label ? `${cap(w.label)} starts with the letter ${L}. The ${L} sound is ${disp}.` : `The letter ${L}. Its sound is ${disp}.`;
    const coachSay  = w.label ? `${cap(w.label)} starts with the letter ${L}. The ${L} sound is... ${say}.` : `The letter ${L}. Its sound is... ${say}.`;
    body.innerHTML=coachHTML(coachDisp)+
      `<div class="card"><div class="bigEmoji">${w.ic||"⭐"}</div>
        <div class="bigword">${L} ${w.word}</div>
        ${w.label?`<div class="label">${w.label}</div>`:""}
        <button class="speakBtn" id="blend">🔊 Hear the sound</button></div>
       <button class="footerBtn" id="nx">Got it! ⭐</button>`;
    $("blend").onclick=()=>speak(`The ${L} sound is... ${say}.`,{rate:.8});
    bindListen(()=>speak(coachSay));
    speak(coachSay,{rate:.9});
  } else {
    const sndHTML=w.sounds.map(s=>`<button class="sbtn" data-s="${s}" aria-label="sound ${s}">${s}</button>`).join("");
    body.innerHTML=coachHTML("Tap each sound. Then blend them together.")+
      `<div class="card"><div class="bigEmoji">${w.ic||"⭐"}</div>
        <div class="sounds">${sndHTML}</div>

        ${w.label?`<div class="label">${w.label}</div>`:""}
        <button class="speakBtn" id="blend">🔊 Blend it: ${w.word}</button></div>
       <button class="footerBtn" id="nx">Got it! ⭐</button>`;
    body.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>{ b.classList.add("lit"); speak(phon(b.dataset.s),{rate:.75}); setTimeout(()=>b.classList.remove("lit"),450); });
    $("blend").onclick=()=>speak(w.sounds.map(phon).join(", ")+". The word is "+w.word+".",{rate:.8});
    bindListen(()=>speak("Listen. "+w.sounds.map(phon).join(", ")+". The word is "+w.word+"."));
    speak("Let's sound out the word: "+w.word+".");
  }
  $("nx").onclick=()=>{ bumpStat(lesson.id,true); lesson.correct++; markSeen(w.word); nextStep(); };

  $("hb").onclick=()=>speak(text,{rate:.85});

function setupRecord(text){
  const recBtn=$("recBtn"), playBtn=$("playBtn"), note=$("recNote");
  if(!navigator.mediaDevices||!window.MediaRecorder){ recBtn.disabled=true; recBtn.style.opacity=.4; note.textContent="(Recording needs microphone permission — you can still practice by saying it out loud.)"; return; }
  let recording=false;
  recBtn.onclick=async()=>{
    if(!recording){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        recChunks=[]; mediaRec=new MediaRecorder(stream);
        mediaRec.ondataavailable=e=>{ if(e.data.size)recChunks.push(e.data); };
        mediaRec.onstop=()=>{ if(recURL)URL.revokeObjectURL(recURL); recURL=URL.createObjectURL(new Blob(recChunks)); playBtn.disabled=false; stream.getTracks().forEach(t=>t.stop()); };
        mediaRec.start(); recording=true; recBtn.classList.add("on"); recBtn.textContent="⏹️ Stop"; note.textContent="Listening… say it now!";
      }catch(e){ note.textContent="(Microphone not allowed. You can still say it out loud!)"; recBtn.disabled=true; recBtn.style.opacity=.4; }
    } else { stopRec(); recBtn.classList.remove("on"); recBtn.textContent="🎤 Record me"; recording=false; note.textContent="Nice! Tap ▶️ to hear yourself."; }
  };

const MATH_MASTER=20; // correct answers at Level 1 needed to unlock Level 2
function rand(n){ return Math.floor(Math.random()*n); }
function genMath(op,level){
  if(level===2){
    if(op==="sub"){
      // two-digit minus, NO borrowing (per IEP)
      const Ta=1+rand(3), Oa=rand(10);           // a = 10..39
      const Tb=rand(Ta+1), Ob=rand(Oa+1);        // each digit of b <= a's digit
      const a=Ta*10+Oa, b=Tb*10+Ob;
      if(b<1||b>=a) return genMath(op,level);
      return {a,b,op:"sub",ans:a-b,level:2};
    }
    const a=10+rand(20), b=5+rand(16);           // two-digit + up to 20
    if(a+b>40) return genMath(op,level);
    return {a,b,op:"add",ans:a+b,level:2};
  }
  // Level 1 — single digit
  if(op==="sub"){ const a=2+rand(9); const b=1+rand(a-1); return {a,b,op:"sub",ans:a-b,level:1}; } // a 2..10
  const a=1+rand(9), b=1+rand(9); return {a,b,op:"add",ans:a+b,level:1};                            // a,b 1..9
}
function level2Unlocked(id){ return (state.mlc[id+"|1"]||0)>=MATH_MASTER || !!(state.mathUnlock&&state.mathUnlock[id]); }
function makeNumChoices(it){
  const ans=it.ans, lvl=it.level||1, add=it.op==="add";
  // Intentional "tempting" distractors: the sum on subtraction, the difference on
  // addition (common operation confusion), plus off-by-one. Then fill from a wider band.
  const tempting = add ? [Math.abs(it.a-it.b), ans+1, ans-1] : [it.a+it.b, ans+1, ans-1];
  const filler = lvl===2 ? [ans+2,ans-2,ans+10,ans-10,ans+11] : [ans+2,ans-2,ans+3];
  const set=new Set([ans]);
  for(const c of [...tempting, ...shuffle(filler)]){ if(set.size>=4)break; if(c>=0&&c!==ans) set.add(c); }
  while(set.size<4){ const r=ans+(rand(13)-6); if(r>=0&&r!==ans) set.add(r); }
  return shuffle([...set]);
}
/* ---- error patterns + hint ladder (for IEP notes) ---- */
function classifyError(it,chosen){
  const add=it.op==="add";
  if(!add && chosen===it.a+it.b) return "sumOnSub";        // chose the sum instead of the difference
  if(add && chosen===Math.abs(it.a-it.b)) return "diffOnAdd";
  if(Math.abs(chosen-it.ans)===1) return "offByOne";
  return "other";
}

function recordHint(id,level){ const k=id+"|h"+level; state.hints[k]=(state.hints[k]||0)+1; saveState(); }

const OP_META={ add:{label:"Put together",ic:"➕",cls:"opAdd"}, sub:{label:"Take away",ic:"➖",cls:"opSub"} };
function rOpStep(it,done){
  const add=it.op==="add", body=$("actBody");
  const q = add?"Are we putting together or taking away?":"Are we adding more, or taking away?";
  body.innerHTML = coachHTML("What are we doing?")+
    `<div class="card"><div class="mathEq big">${it.a} <span class="opsign ${add?'add':'sub'}">${add?'+':'–'}</span> ${it.b}</div>
      <div class="prompt">${q} Look at the sign.</div>
      <div class="opChoices" id="opc"></div>
      <div class="encourage" id="enc"></div></div>`;

    b.innerHTML=`<span class="opIc">${m.ic}</span><span>${m.label}</span>`;
    b.onclick=()=>{
      if(b.dataset.locked)return;
      if(op===it.op){ b.classList.add("correct"); state.opStat[lesson.id+"|ok"]=(state.opStat[lesson.id+"|ok"]||0)+1; saveState(); speak(add?"Put together!":"Take away!"); setTimeout(done,700); }
      else { b.classList.add("wrong"); b.dataset.locked=1; recordError(lesson.id,"opConfusion"); (lesson._mis=lesson._mis||[]).push("operationConfusion"); $("enc").textContent="Look at the sign. 👀"; speak(add?"This sign means put together.":"This sign means take away."); }
    };

function renderMath(){

/* ---- Blocks (Level 1): tap to count (add) or take away (sub) ---- */
function rMathSticks(it){
  const add=it.op==="add", body=$("actBody");
  const coachTxt = add
    ? `Let's add ${it.a} plus ${it.b}. Tap each block to count them all.`
    : `You have ${it.a}. Take away ${it.b}. Tap ${it.b} blocks to take them away.`;
  body.innerHTML = coachHTML(coachTxt)+
    `<div class="card mathCard">
      <div class="mathEq">${it.a} <span class="opsign ${add?'add':'sub'}">${add?'+':'–'}</span> ${it.b} = <span class="qm">?</span></div>
      <div class="counters" id="counters"></div>
      <div class="countTotal" id="ctot"></div>
      <button class="btnMini" id="auto">${add?'👀 Count for me':'👀 Show me'}</button>
      <div class="prompt">${add?'How many altogether?':'How many are left?'}</div>
      <div class="numChoices" id="opts"></div>
      <div class="encourage" id="enc"></div>
    </div>`;
  const counters=$("counters");
  if(add){
    for(let i=0;i<it.a;i++) counters.appendChild(makeBlock("g1"));
    const plus=elc("div","plusSign"); plus.textContent="+"; counters.appendChild(plus);
    for(let i=0;i<it.b;i++) counters.appendChild(makeBlock("g2"));
  } else { for(let i=0;i<it.a;i++) counters.appendChild(makeBlock("g1")); }
  const blocks=[...counters.querySelectorAll(".counter")];
  const tot=$("ctot"); let n=0;
  tot.textContent = add ? "Counted: 0" : "Left: "+it.a;
  blocks.forEach(b=>b.onclick=()=>{
    if(add){ if(b.dataset.c)return; b.dataset.c=1; b.classList.add("counted"); n++; speak(String(n)); tot.textContent="Counted: "+n; }
    else { if(b.dataset.g)return; if(n>=it.b)return; b.dataset.g=1; b.classList.add("gone"); n++; speak("take away"); tot.textContent="Left: "+(it.a-n); }
  });
  $("auto").onclick=()=>{ let i=0; const step=()=>{
    if(add){ if(i>=blocks.length)return; const b=blocks[i]; if(!b.dataset.c){b.dataset.c=1;b.classList.add("counted");} i++; speak(String(i)); tot.textContent="Counted: "+i; if(i<blocks.length)setTimeout(step,560); }
    else { if(i>=it.b)return; const b=blocks[i]; b.dataset.g=1; b.classList.add("gone"); i++; speak("take away"); tot.textContent="Left: "+(it.a-i); if(i<it.b)setTimeout(step,560); }
  }; step(); };
  mathChoices(it);
  bindListen(()=>speak(coachTxt)); speak(coachTxt,{rate:.9});
}

/* ---- Base-ten blocks (Level 2): tens-rods + ones ---- */
function rMathBaseTen(it){
  const add=it.op==="add", body=$("actBody");
  const bt=Math.floor(it.b/10), bo=it.b%10;
  const coachTxt = add
    ? `Let's add ${it.a} plus ${it.b}. Tap the tall tens and the small ones to count.`
    : `You have ${it.a}. Take away ${it.b}. Cross out ${bt} ten${bt===1?'':'s'} and ${bo} one${bo===1?'':'s'}.`;
  body.innerHTML = coachHTML(coachTxt)+
    `<div class="card mathCard">
      <div class="mathEq">${it.a} <span class="opsign ${add?'add':'sub'}">${add?'+':'–'}</span> ${it.b} = <span class="qm">?</span></div>
      <div class="counters bt" id="counters"></div>
      <div class="countTotal" id="ctot"></div>
      <button class="btnMini" id="auto">${add?'👀 Count for me':'👀 Show me'}</button>
      <div class="prompt">${add?'How many altogether?':'How many are left?'}</div>
      <div class="numChoices" id="opts"></div>
      <div class="encourage" id="enc"></div>
    </div>`;
  const counters=$("counters");
  counters.appendChild(baseTenGroup(it.a,"g1"));
  if(add){ const plus=elc("div","plusSign"); plus.textContent="+"; counters.appendChild(plus); counters.appendChild(baseTenGroup(it.b,"g2")); }
  const rods=[...counters.querySelectorAll(".rod")], ones=[...counters.querySelectorAll(".one")];
  const tot=$("ctot");
  if(add){
    let n=0; tot.textContent="Counted: 0";
    const tap=(el,val)=>{ if(el.dataset.c)return; el.dataset.c=1; el.classList.add("counted"); n+=val; speak(String(n)); tot.textContent="Counted: "+n; };
    rods.forEach(r=>r.onclick=()=>tap(r,10)); ones.forEach(o=>o.onclick=()=>tap(o,1));
    $("auto").onclick=()=>{ const q=[...rods,...ones]; let i=0,n2=0; const step=()=>{ if(i>=q.length)return; const el=q[i],val=el.classList.contains("rod")?10:1; if(!el.dataset.c){el.dataset.c=1;el.classList.add("counted");} n2+=val; i++; speak(String(n2)); tot.textContent="Counted: "+n2; if(i<q.length)setTimeout(step,520); }; step(); };
  } else {
    let rt=0, ro=0; tot.textContent="Left: "+it.a;
    const upd=()=>{ tot.textContent="Left: "+(it.a-(rt*10+ro)); };
    rods.forEach(r=>r.onclick=()=>{ if(r.dataset.g||rt>=bt)return; r.dataset.g=1; r.classList.add("gone"); rt++; speak("take away ten"); upd(); });
    ones.forEach(o=>o.onclick=()=>{ if(o.dataset.g||ro>=bo)return; o.dataset.g=1; o.classList.add("gone"); ro++; speak("take away"); upd(); });
    $("auto").onclick=()=>{ const q=[...rods.slice(0,bt),...ones.slice(0,bo)]; let i=0; const step=()=>{ if(i>=q.length)return; const el=q[i]; if(!el.dataset.g){el.dataset.g=1;el.classList.add("gone"); if(el.classList.contains("rod"))rt=Math.min(bt,rt+1); else ro=Math.min(bo,ro+1);} i++; upd(); speak("take away"); if(i<q.length)setTimeout(step,520); }; step(); };
  }
  mathChoices(it);
  bindListen(()=>speak(coachTxt)); speak(coachTxt,{rate:.9});
}

/* ---- Tally marks: four bars + a slash across for five ---- */
function rMathTally(it){

  const coachTxt = add
    ? `Let's count the tally marks. Count by fives, then count the extra marks.`
    : `Some marks are crossed out — those are taken away. Count the marks that are left.`;

/* ---- Number line: hop a frog (Level 2 hops by tens and ones) ---- */
function paintLine(span,pos){
  const nl=$("nl"); nl.innerHTML="";
  for(let i=0;i<=span;i++){
    const c=elc("div","nlcell"+(i===pos?" here":""));
    c.innerHTML=`<div class="nlmark">${i===pos?"🐸":""}</div><div class="nltick"></div><div class="nlnum">${i}</div>`;
    nl.appendChild(c);
  }
}
function rMathLine(it){
  const add=it.op==="add", body=$("actBody"), lvl2=it.level===2;
  const span=Math.max(add?(it.a+it.b):it.a, 10);
  let pos=it.a, remain=it.b;
  const coachTxt = add
    ? `Start at ${it.a}. Hop forward ${it.b}${lvl2?' — use tens and ones!':' times!'}`
    : `Start at ${it.a}. Hop back ${it.b}${lvl2?' — use tens and ones!':' times!'}`;
  body.innerHTML = coachHTML(coachTxt)+
    `<div class="card">
      <div class="mathEq">${it.a} <span class="opsign ${add?'add':'sub'}">${add?'+':'–'}</span> ${it.b} = <span class="qm">?</span></div>
      <div class="numline" id="nl"></div>
      <div class="prompt">Left to hop: <b id="hopn">${it.b}</b></div>
      <div class="hopBtns" id="hopBtns"></div>
      <div class="encourage" id="enc"></div>
    </div>`;
  paintLine(span,pos);
  const hb=$("hopBtns");
  function hop(step){
    if(remain<step) return;
    remain-=step; pos += add?step:-step; speak(String(pos));
    paintLine(span,pos); $("hopn").textContent=remain;
    if(remain<=0){
      hb.querySelectorAll("button").forEach(b=>b.disabled=true);
      onMathCorrect(it); logSkillResolved();
      $("enc").textContent=`🎉 ${it.a} ${add?'+':'–'} ${it.b} = ${pos}`;
      speak(`We landed on ${pos}! ${it.a} ${add?'plus':'minus'} ${it.b} is ${pos}.`);
      setTimeout(nextStep,5000);
    }
  }
  if(lvl2){
    const b10=elc("button","footerBtn"+(add?"":" alt")); b10.textContent=add?'➡️ Hop 10':'⬅️ Hop 10'; b10.onclick=()=>hop(10);
    const b1=elc("button","footerBtn"+(add?"":" alt")); b1.style.marginTop="8px"; b1.textContent=add?'➡️ Hop 1':'⬅️ Hop 1'; b1.onclick=()=>hop(1);
    hb.appendChild(b10); hb.appendChild(b1);
  } else {
    const b1=elc("button","footerBtn"+(add?"":" alt")); b1.textContent=add?'➡️ Hop forward':'⬅️ Hop back'; b1.onclick=()=>hop(1);
    hb.appendChild(b1);
  }
  bindListen(()=>speak(coachTxt)); speak(coachTxt,{rate:.9});
}

  if(plan){ const last=plan.i>=plan.steps.length-1; btns=`<button class="footerBtn" style="margin-top:14px" id="rwNext">${last?'Finish 🎉':'Next ▶️'}</button>`; }
  else { btns=`<button class="footerBtn" style="margin-top:14px" id="rwHome">Back to the Field 🏟️</button>
    <button class="backBtn" style="margin-top:10px" id="rwAgain">▶️ Play again</button>`; }
  ov.innerHTML=`<div class="rewardCard">
    <div class="grow">${scored?"⚾":"⭐"}</div>
    <h2>${cheer()}</h2>
    <div style="font-size:17px;font-weight:800;margin:6px 0">${scored?"You scored a RUN! 🎉":"You earned "+earned+" stars! ⭐"}</div>
    <div class="pill" style="display:inline-flex;margin:8px auto">⭐ +${earned}</div><br>
    ${btns}</div>`;
  document.body.appendChild(ov);

  else {
    ov.querySelector("#rwHome").onclick=()=>{ ov.remove(); goHome(); };
    ov.querySelector("#rwAgain").onclick=()=>{ ov.remove(); if(currentTopic) startActivity(lesson.id,lesson.kind); else goHome(); };
  }
  speak(scored?"You scored a run! "+cheer():cheer());
  if(!(state.settings&&(state.settings.reduceMotion||state.settings.calm))) burstConfetti();
}
function burstConfetti(){
  const ems=["⭐","⚾","🎉","🌟","🏆","💫"];

}

/* ===================== INSIGHTS + CONTENT VALIDATION ===================== */
function mathInsights(){
  const out=[];
  [["add","Addition"],["sub","Subtraction"]].forEach(([id,nm])=>{
    const sum=state.errpat[id+"|sumOnSub"]||0, diff=state.errpat[id+"|diffOnAdd"]||0;
    const opc=state.errpat[id+"|opConfusion"]||0, off=state.errpat[id+"|offByOne"]||0;
    const model=(state.hints[id+"|h2"]||0)+(state.hints[id+"|h3"]||0);
    if(id==="sub"&&sum>=3) out.push(`${nm}: sometimes picks the sum instead of taking away (${sum}×).`);
    if(id==="add"&&diff>=3) out.push(`${nm}: sometimes takes away instead of adding (${diff}×).`);
    if(opc>=3) out.push(`${nm}: mixes up the +/− sign (${opc}×) — the "What are we doing?" step targets this.`);
    if(model>=3) out.push(`${nm}: does better with the visual model — needed "show me" ${model}×.`);
    if(off>=3) out.push(`${nm}: often off by one (${off}×) — likely a counting slip, not a concept gap.`);
  });
  if((state.replays||0)>=8) out.push(`Uses the Listen button a lot (${state.replays}×) — answers better when the instruction is repeated.`);
  return out;
}
function validateContent(){
  if(typeof TOPICS==="undefined") return;
  const ok=[];
  TOPICS.forEach(t=>{
    if(!t||!t.id||!t.name||!t.type){ console.warn("All-Star: skipping malformed topic", t); return; }
    const generated = t.type==="math" || t.type==="ns" || !!t.count;
    if(!generated && (!Array.isArray(t.items)||!t.items.length)){ console.warn("All-Star: topic has no items, skipping", t.id); return; }
    ok.push(t);
  });
  TOPICS.length=0; ok.forEach(t=>TOPICS.push(t));
}

/* ---- adaptive dashboard reports ---- */
function weeklyNarrative(){
  const out=[]; const S=state.skills||{};
  const wc=S["m.wordclue"];
  if(wc&&wc.att>=4&&indAccuracy("m.wordclue")>=0.6) out.push("Richit is improving at telling addition words from subtraction words.");
  const sub=S["m.sub1"];
  if(sub&&sub.mis&&(sub.mis.choseSumOnSub||0)>=2) out.push("During subtraction he still sometimes chooses the sum instead of taking away — keep modelling 'take away' with the blocks.");
  const add=S["m.add1"];
  if(add&&add.mis&&(add.mis.countedOnlyFirstGroup||0)>=2) out.push("In addition he sometimes counts only the first group — point to both groups before he answers.");
  const c=skillStateCounts();
  if(c.mastered>0) out.push(`${c.mastered} skill${c.mastered>1?'s':''} now meet the mastery bar (3 days · 80% independent · 2 formats).`);
  if(c.emerging>0) out.push(`${c.emerging} skill${c.emerging>1?'s are':' is'} emerging.`);
  let modeled=0,total=0; CURRICULUM.forEach(s=>{const r=S[s.skillId]; if(r)r.recent.forEach(x=>{total++; if(x.pl==="modeled"||x.pl==="visual")modeled++;});});
  if(total>=10&&modeled/total>0.4) out.push("He's leaning on hints and models right now — independence grows as he repeats the same skill across different days.");
  if(!out.length) out.push("Not enough practice yet this week to summarise patterns — a few short sessions will fill this in.");
  return out;
}
function promptLevelReport(){ const c={independent:0,replay:0,visual:0,modeled:0}; CURRICULUM.forEach(s=>{const r=state.skills&&state.skills[s.skillId]; if(r)r.recent.forEach(x=>{ if(c[x.pl]!=null)c[x.pl]++; });}); return c; }
function misconceptionReport(){ const agg={}; CURRICULUM.forEach(s=>{const r=state.skills&&state.skills[s.skillId]; if(r)Object.keys(r.mis||{}).forEach(t=>agg[t]=(agg[t]||0)+r.mis[t]);}); return Object.entries(agg).sort((a,b)=>b[1]-a[1]); }
function skillTreeHTML(){
  const LBL={"not-started":"not started","needs-support":"Needs support","supported":"Supported","emerging":"Emerging","mastered":"⭐ Mastered"};
  const CLR={"not-started":"#9aa7b8","needs-support":"#e0697a","supported":"#e8913a","emerging":"#3f7fe0","mastered":"#1c9e57"};

function download(name,text,mime){

  catch(e){ alert("Couldn't export here — try opening the app in Chrome or Safari."); }
}
function statRowsForExport(){ const rows=[]; TOPICS.forEach(t=>{ const s=state.stats[t.id]; if(!s||!s.a)return; rows.push([t.name, s.sess||0, s.a, s.c, Math.round(100*s.c/s.a)]); }); return rows; }
function exportCSV(){
  let lines=[["Skill","Plays","Tries","Correct","Accuracy%"], ...statRowsForExport()];
  lines.push([],["Skill","State","Progress%","IndependentAcc%","Days","Formats"]);
  CURRICULUM.filter(s=>!s.planned&&!s.ungraded).forEach(s=>{ const r=state.skills&&state.skills[s.skillId]; if(!r||!r.att)return;
    lines.push([s.label, skillState(s.skillId), skillProgress(s.skillId), Math.round(100*indAccuracy(s.skillId)), Object.keys(r.days).length, Object.keys(r.formats).length]); });
  lines.push([],["Misconception","Count"]); misconceptionReport().forEach(([t,n])=>lines.push([MISCONCEPTION_LABEL[t]||t, n]));
  lines.push([],["This week"]); weeklyNarrative().forEach(s=>lines.push([s]));

  lines.push([],["Stars",state.stars],["Runs",state.runs],["Skills practiced",Object.keys(state.seen).length],["Days practiced",Object.keys(state.log).length]);
  const csv=lines.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  download("richit-progress-"+todayKey()+".csv", csv, "text/csv");
}

function restoreJSON(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); state=Object.assign(base(),d); saveState(); applySettings(); toast("Backup restored ✅"); openParent(); }catch(e){ alert("That file wasn't a valid backup."); } }; r.readAsText(file); }

let warmed=false;
document.addEventListener("pointerdown",()=>{ if(!warmed&&'speechSynthesis'in window){ const u=new SpeechSynthesisUtterance(" "); u.volume=0; try{speechSynthesis.speak(u);}catch(e){} warmed=true; pickVoice(); } });

validateContent();
applySettings();
showLanding();
</script>
<script>
if('serviceWorker'in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
