<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="All-Star">
<meta name="theme-color" content="#eaf1fb">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>Richit's All-Star Field</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  :root{
    --bg1:#eef4fc; --bg2:#e6eef7; --ink:#22304a; --muted:#64748b;
    --card:#ffffff; --soft:#eef3f9; --line:#e2e9f2;
    --blue:#3f7fe0; --blue2:#2f63b8; --green:#48b463; --teal:#1bb3a6;
    --purple:#8b6fd6; --pink:#ef7d9d; --sun:#f3b73b; --good:#1c9e57;
    --field:#3f9d52; --field2:#2f7e41; --dirt:#c98a4b;
    --shadow:rgba(26,40,70,.10); --shadowS:rgba(26,40,70,.06);
  }
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);}
  body{background:radial-gradient(120% 80% at 50% -10%,#ffffff 0%,var(--bg1) 48%,var(--bg2) 100%);overflow:hidden;}
  #app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:780px;margin:0 auto;position:relative;}
  .screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 18px 60px;}
  .hidden{display:none!important;}

  .topbar{display:flex;align-items:center;gap:8px;padding:12px 16px 4px;}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-weight:800;
    box-shadow:0 2px 8px var(--shadowS);display:flex;align-items:center;gap:7px;font-size:16px;}
  .pill .ico{font-size:18px;}
  .spacer{flex:1;}
  .iconbtn{background:var(--card);border:1px solid var(--line);border-radius:50%;width:44px;height:44px;font-size:20px;
    box-shadow:0 2px 8px var(--shadowS);color:var(--ink);cursor:pointer;transition:transform .12s;}
  .iconbtn:active{transform:scale(.92);}

  h1{font-size:26px;font-weight:900;margin:8px 0 2px;text-align:center;letter-spacing:-.4px;}
  .sub{text-align:center;font-size:14.5px;color:var(--muted);margin-bottom:14px;}

  /* All-Star Field */
  #field{background:linear-gradient(160deg,#4aa85d,#2f7e41);border-radius:22px;padding:16px 16px 14px;color:#fff;
    box-shadow:0 12px 30px rgba(26,40,70,.22);margin-bottom:16px;position:relative;overflow:hidden;}
  .scoreRow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .scoreRow .lab{font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;opacity:.9;}
  .scoreBox{background:rgba(0,0,0,.22);border-radius:10px;padding:4px 12px;font-weight:900;font-size:18px;}
  .diamond{position:relative;width:170px;height:170px;margin:6px auto 2px;}
  .base{position:absolute;width:30px;height:30px;background:#fff;border-radius:7px;transform:rotate(45deg);
    box-shadow:0 2px 6px rgba(0,0,0,.25);border:2px solid #e7eef6;}
  .base.lit{background:var(--sun);border-color:#e0a72a;animation:pop .4s;}
  .base.home{background:#fff;}
  .base.home.lit{background:var(--sun);}
  #b1{right:0;top:50%;margin-top:-15px;} #b2{left:50%;top:0;margin-left:-15px;}
  #b3{left:0;top:50%;margin-top:-15px;} #bH{left:50%;bottom:0;margin-left:-15px;}
  .runner{position:absolute;font-size:24px;transition:all .5s ease;left:50%;bottom:-4px;margin-left:-14px;}
  .fieldNote{text-align:center;font-size:13px;opacity:.92;margin-top:8px;font-weight:700;}
  .team{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .team .mate{font-size:22px;background:rgba(255,255,255,.16);border-radius:10px;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;}

  /* Skill of the day */
  .wotd{display:block;width:100%;text-align:left;border:1px solid var(--line);cursor:pointer;
    background:linear-gradient(120deg,#eaf2ff,#eef9f2);border-radius:18px;padding:15px;margin-bottom:16px;box-shadow:0 2px 12px var(--shadowS);}
  .wotd .tag{font-size:11px;font-weight:900;color:var(--blue);letter-spacing:1px;text-transform:uppercase;}
  .wotd .row{display:flex;align-items:center;gap:14px;margin-top:8px;}
  .wotd .wic{font-size:40px;}
  .wotd .ww{font-size:30px;font-weight:900;}
  .wotd .wl{font-size:15px;color:var(--muted);font-weight:700;}
  .wotd .hear{margin-left:auto;font-size:20px;background:var(--ink);color:#fff;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}

  .sectionTitle{font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:18px 2px 10px;}
  .units{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
  .unit{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center;
    box-shadow:0 2px 10px var(--shadowS);cursor:pointer;transition:transform .12s;border-top:5px solid var(--blue);}
  .unit:active{transform:translateY(2px);}
  .unit.c-blue{border-top-color:var(--blue);} .unit.c-green{border-top-color:var(--green);}
  .unit.c-purple{border-top-color:var(--purple);} .unit.c-pink{border-top-color:var(--pink);}
  .unit.c-sun{border-top-color:var(--sun);} .unit.c-teal{border-top-color:var(--teal);}
  .unit .emoji{font-size:32px;display:block;margin-bottom:6px;}
  .unit .name{font-weight:800;font-size:13.5px;line-height:1.2;}
  .unit .prog{font-size:11px;color:var(--muted);margin-top:5px;font-weight:700;}
  .unit .bar{height:5px;background:var(--soft);border-radius:6px;margin-top:7px;overflow:hidden;}
  .unit .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--teal));width:0;border-radius:6px;transition:width .4s;}

  .actBtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:15px;margin-bottom:11px;box-shadow:0 2px 10px var(--shadowS);text-align:left;cursor:pointer;transition:transform .12s;}
  .actBtn:active{transform:translateY(2px);}
  .actBtn .big{font-size:26px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:13px;background:var(--soft);flex:0 0 auto;}
  .actBtn .t{font-weight:800;font-size:16px;}
  .actBtn .d{font-size:13px;color:var(--muted);font-weight:600;}

  .coach{display:flex;align-items:center;gap:12px;background:#eef5fd;border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:14px;}
  .coach .face{font-size:30px;}
  .coach .bubble{font-weight:800;font-size:15.5px;flex:1;line-height:1.3;}
  .coach .listen{border:none;background:var(--sun);color:#5a4410;font-weight:800;font-size:14px;padding:10px 13px;border-radius:13px;cursor:pointer;box-shadow:0 3px 0 #d39e2c;flex:0 0 auto;}
  .coach .listen:active{transform:translateY(2px);box-shadow:0 1px 0 #d39e2c;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px 20px;box-shadow:0 4px 18px var(--shadowS);text-align:center;margin-bottom:16px;}
  .bigEmoji{font-size:84px;line-height:1.1;margin:2px 0;}
  .bigword{font-size:46px;font-weight:900;letter-spacing:2px;margin:6px 0;}
  .label{font-size:18px;color:var(--purple);font-weight:800;margin-top:2px;}
  .scene{font-size:64px;line-height:1.1;margin:4px 0;}
  .storyText{font-size:21px;line-height:1.6;max-width:640px;margin:6px auto;font-weight:600;}
  .prompt{font-size:16px;font-weight:800;color:var(--muted);margin:4px 0 12px;text-align:center;}

  .speakBtn{background:var(--ink);color:#fff;border:none;border-radius:13px;padding:13px 22px;font-size:15px;font-weight:800;
    margin-top:14px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 3px 12px var(--shadowS);}
  .speakBtn:active{transform:scale(.97);}

  .sounds{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0 4px;}
  .sbtn{font-size:30px;font-weight:900;min-width:62px;padding:12px 8px;border-radius:14px;border:none;cursor:pointer;
    background:#eaf2fb;color:var(--blue2);box-shadow:0 4px 0 #cfe0f2;}
  .sbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #cfe0f2;}
  .sbtn.lit{background:var(--sun);color:#5a4410;box-shadow:0 4px 0 #d39e2c;}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .opt{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:18px 10px;font-size:40px;
    box-shadow:0 2px 8px var(--shadowS);cursor:pointer;transition:transform .12s,border-color .15s,background .15s;color:var(--ink);}
  .opt .lab{display:block;font-size:15px;font-weight:700;margin-top:6px;}
  .opt.txt{font-size:22px;font-weight:800;}
  .opt:active{transform:translateY(2px);}
  .opt.correct{border-color:var(--good);background:#eafaf1;}
  .opt.wrong{border-color:#f3b3b3;background:#fdf0f0;opacity:.7;}
  .opt.hint{border-color:var(--sun);box-shadow:0 0 0 4px rgba(243,183,59,.4);}

  .dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;background:#d2dbe8;}
  .dot.done{background:var(--good);} .dot.now{background:var(--blue);transform:scale(1.3);}

  .backBtn{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 15px;font-weight:700;font-size:14px;
    box-shadow:0 2px 8px var(--shadowS);display:inline-flex;align-items:center;gap:6px;color:var(--ink);cursor:pointer;}
  .footerBtn{width:100%;background:linear-gradient(90deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:14px;
    padding:16px;font-size:16px;font-weight:800;box-shadow:0 8px 20px rgba(63,127,224,.30);margin-top:6px;cursor:pointer;}
  .footerBtn:active{transform:translateY(2px);}
  .footerBtn.alt{background:linear-gradient(90deg,var(--green),var(--teal));box-shadow:0 8px 20px rgba(27,179,166,.28);}
  .encourage{font-size:17px;font-weight:800;color:var(--good);min-height:24px;margin-top:10px;text-align:center;}

  /* record controls */
  .recRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
  .recBtn{border:none;border-radius:13px;padding:13px 18px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px var(--shadowS);display:inline-flex;align-items:center;gap:8px;}
  .recBtn.rec{background:#ef5b6b;color:#fff;} .recBtn.rec.on{animation:pulse 1s infinite;}
  .recBtn.play{background:var(--green);color:#fff;} .recBtn.play:disabled{opacity:.4;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,91,107,.5)}50%{box-shadow:0 0 0 10px rgba(239,91,107,0)}}

  /* overlay */
  .overlay{position:fixed;inset:0;background:rgba(18,28,48,.46);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .rewardCard{background:var(--card);border-radius:22px;padding:30px;text-align:center;max-width:370px;width:100%;box-shadow:0 24px 60px rgba(18,28,48,.4);animation:pop .4s;}
  .rewardCard .grow{font-size:78px;animation:bounce 1.4s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
  .rewardCard h2{font-size:23px;font-weight:900;margin:8px 0;}
  .confetti{position:fixed;top:-10px;font-size:22px;z-index:60;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-weight:700;z-index:70;font-size:14px;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .breathe{width:160px;height:160px;border-radius:50%;margin:18px auto;background:radial-gradient(circle,#bfe3ff,#7fb8ec);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#23527c;animation:breathe 8s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(.65)}50%{transform:scale(1.1)}}

  /* parent */
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px var(--shadowS);margin-bottom:14px;}
  .statRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stat{background:var(--soft);border-radius:13px;padding:14px;text-align:center;}
  .stat .n{font-size:26px;font-weight:900;color:var(--blue);}
  .stat .l{font-size:12px;font-weight:700;color:var(--muted);}
  table{width:100%;border-collapse:collapse;margin-top:6px;font-size:14px;}
  th,td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
  .pbar{height:12px;background:var(--soft);border-radius:7px;overflow:hidden;}
  .pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--teal));}
  .cal{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
  .cal .day{width:30px;text-align:center;}
  .cal .box{height:28px;border-radius:8px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .cal .box.on{background:#d6f0e0;}
  .cal .dl{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .chip{background:var(--soft);border-radius:999px;padding:6px 11px;font-size:13px;font-weight:700;}
  .vrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .vbtn{padding:9px 13px;border-radius:12px;border:2px solid var(--line);background:#fff;cursor:pointer;font-weight:700;font-size:13px;}
  .vbtn.on{border-color:var(--blue);background:#eaf2fb;}
  .note{font-size:13.5px;color:var(--muted);line-height:1.55;font-weight:600;}

  /* ===== v2: landing + iPad layout (minimal scroll) ===== */
  #app{max-width:940px;}
  .screen{padding:8px 20px 20px;}

  #landingScreen{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(130% 90% at 50% -8%,#5aa0e6 0%,#3f7fe0 46%,#2f63b8 100%);color:#fff;text-align:center;padding:24px;}
  .landingInner{max-width:540px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .landingBadge{width:148px;height:148px;border-radius:38px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;
    font-size:82px;box-shadow:0 18px 44px rgba(0,0,0,.28);margin-bottom:6px;animation:bounce 2.2s ease-in-out infinite;}
  .landingTitle{color:#fff;font-size:44px;line-height:1.04;margin:6px 0 0;text-shadow:0 3px 14px rgba(0,0,0,.22);}
  .landingTag{font-size:17px;font-weight:700;opacity:.95;margin-bottom:16px;}
  .playBtn{background:#fff;color:#2f63b8;border:none;border-radius:18px;padding:18px 44px;font-size:23px;font-weight:900;cursor:pointer;
    box-shadow:0 8px 0 rgba(0,0,0,.16);transition:transform .1s,box-shadow .1s;}
  .playBtn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,.16);}
  .grownBtn{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:14px;padding:11px 18px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
  .grownBtn:active{transform:scale(.96);}

  .homeHero{display:flex;gap:14px;align-items:stretch;margin-bottom:6px;}
  .homeHero #field{flex:1;margin-bottom:0;}
  .homeHero .wotd{flex:0 0 38%;margin-bottom:0;display:flex;flex-direction:column;justify-content:center;}
  @media (max-width:640px){ .homeHero{flex-direction:column;} .homeHero .wotd{flex:auto;} }

  #field{padding:12px 14px;}
  .diamond{width:118px;height:118px;margin:2px auto 0;}
  .base{width:24px;height:24px;}
  #b1{margin-top:-12px;} #b3{margin-top:-12px;} #b2{margin-left:-12px;} #bH{margin-left:-12px;}
  .runner{font-size:20px;margin-left:-11px;}
  .fieldNote{margin-top:6px;}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;border:2px solid var(--line);background:var(--card);border-radius:999px;padding:11px 18px;font-weight:800;font-size:15.5px;
    color:var(--muted);cursor:pointer;box-shadow:0 2px 8px var(--shadowS);transition:transform .1s;}
  .tab:active{transform:scale(.96);}
  .tab.on{background:var(--blue);border-color:var(--blue);color:#fff;}

  #sections.units{grid-template-columns:repeat(2,1fr);}
  @media (min-width:560px){ #sections.units{grid-template-columns:repeat(3,1fr);} }
  @media (min-width:760px){ #sections.units{grid-template-columns:repeat(4,1fr);} }
  .unit{padding:18px 10px;}
  .unit .emoji{font-size:38px;}
  .unit .name{font-size:15px;}

  /* center activity content so short activities don't sit at the very top on iPad */
  #actBody{max-width:680px;margin:0 auto;}

  /* ===== Math ===== */
  .mathEq{font-size:30px;font-weight:900;margin:2px 0 10px;letter-spacing:1px;}
  .mathEq.big{font-size:42px;margin-bottom:16px;}
  .mathEq .qm{color:var(--blue);}
  .counters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;margin:8px auto 6px;max-width:540px;}
  .counters.small{transform:scale(.8);margin:0 auto;}
  .counter{width:34px;height:50px;border-radius:9px;border:none;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.14);transition:transform .12s,opacity .2s;}
  .counter.g1{background:linear-gradient(160deg,#5aa0e6,#3f7fe0);}
  .counter.g2{background:linear-gradient(160deg,#6cc96c,#48b463);}
  .counter:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.14);}
  .counter.counted{outline:4px solid var(--sun);outline-offset:2px;transform:translateY(-4px) scale(1.06);}
  .counter.gone{opacity:.28;transform:scale(.8) rotate(8deg);box-shadow:none;position:relative;}
  .counter.gone::after{content:"✕";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#b23;font-size:24px;font-weight:900;}
  .plusSign{font-size:30px;font-weight:900;color:var(--muted);padding:0 4px;}
  .countTotal{font-size:24px;font-weight:900;color:var(--ink);margin:6px 0;}
  .btnMini{border:none;background:var(--soft);color:var(--ink);font-weight:800;font-size:14px;padding:10px 16px;border-radius:13px;cursor:pointer;box-shadow:0 2px 8px var(--shadowS);margin-bottom:8px;}
  .btnMini:active{transform:translateY(2px);}
  .numChoices{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
  .numBtn{min-width:78px;font-size:30px;font-weight:900;padding:16px 10px;border-radius:16px;border:3px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;box-shadow:0 3px 10px var(--shadowS);transition:transform .1s;}
  .numBtn:active{transform:translateY(2px);}
  .numBtn.correct{border-color:var(--good);background:#eafaf1;}
  .numBtn.wrong{border-color:#f3b3b3;background:#fdf0f0;opacity:.7;}

  .numline{display:flex;overflow-x:auto;gap:0;padding:6px 4px 2px;justify-content:flex-start;-webkit-overflow-scrolling:touch;}
  .nlcell{flex:0 0 auto;width:38px;text-align:center;}
  .nlmark{height:26px;font-size:22px;line-height:26px;}
  .nltick{height:14px;border-left:2px solid var(--line);width:0;margin:0 auto;}
  .nlnum{font-size:15px;font-weight:800;color:var(--muted);margin-top:2px;}
  .nlcell.here .nlnum{color:var(--blue);font-size:18px;}
  .nlcell.here .nltick{border-color:var(--blue);}
</style>
</head>
<body>
<div id="app">
  <!-- LANDING -->
  <div id="landingScreen">
    <div class="landingInner">
      <div class="landingBadge">⚾</div>
      <h1 class="landingTitle">Richit's<br>All-Star Field</h1>
      <div class="landingTag">Read a little · score a run · fill your field ⭐</div>
      <button class="playBtn" id="startBtn">▶️ Let's Play!</button>
      <button class="grownBtn" id="landingParent">👪 For grown-ups</button>
    </div>
  </div>

  <div class="topbar hidden" id="topbar">
    <div class="pill"><span class="ico">⭐</span><span id="starCount">0</span></div>
    <div class="pill"><span class="ico">⚾</span><span id="runCount">0</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="parentBtn" title="grown-ups">👪</button>
    <button class="iconbtn" id="muteBtn" title="sound">🔊</button>
  </div>

  <!-- HOME -->
  <div class="screen" id="homeScreen">
    <div class="homeHero">
      <div id="field">
        <div class="scoreRow"><span class="lab">⚾ Scoreboard</span><span class="scoreBox" id="scoreBox">0 runs</span></div>
        <div class="diamond">
          <div class="base" id="b2"></div><div class="base" id="b1"></div>
          <div class="base" id="b3"></div><div class="base home" id="bH"></div>
          <div class="runner" id="runner">🧢</div>
        </div>
        <div class="fieldNote" id="fieldNote">Play a game to start running the bases! 🏃</div>
        <div class="team" id="teamRow"></div>
      </div>
      <button id="wotd" class="wotd"></button>
    </div>
    <div class="tabs" id="tabBar"></div>
    <div class="units" id="sections"></div>
  </div>

  <!-- TOPIC MENU -->
  <div class="screen hidden" id="menuScreen">
    <button class="backBtn" id="menuBack">⬅️ Field</button>
    <h1 id="menuTitle" style="margin-top:10px;"></h1>
    <div class="sub" id="menuSub"></div>
    <div id="menuActs" style="margin-top:6px;"></div>
  </div>

  <!-- ACTIVITY -->
  <div class="screen hidden" id="actScreen">
    <button class="backBtn" id="actBack">⬅️ Back</button>
    <div class="dots" id="dots" style="margin-top:12px;"></div>
    <div id="actBody"></div>
  </div>

  <!-- PARENT -->
  <div class="screen hidden" id="parentScreen">
    <button class="backBtn" id="parentBack">⬅️ Field</button>
    <h1 style="margin-top:10px;">Parent Dashboard</h1>
    <div class="sub">Progress for Richit — for your eyes & IEP notes</div>
    <div id="parentBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
/* ===================== STATE ===================== */
const SAVE_KEY="richitAllStar_v1";
let state=loadState(), muted=false, currentTopic=null, lesson=null;
function loadState(){ try{const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s) return Object.assign(base(),s);}catch(e){} return base(); }
function base(){ return {stars:0, runs:0, basePos:0, team:[], done:{}, log:{}, seen:{}, stats:{}, voice:null}; }
function saveState(){ try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){} }

/* ===================== SPEECH ===================== */
let enVoice=null;
function pickVoice(){
  if(!('speechSynthesis'in window))return;
  const vs=speechSynthesis.getVoices();
  if(state.voice){ const v=vs.find(v=>v.name===state.voice); if(v){enVoice=v;return;} }
  enVoice=vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||vs[0]||null;
}
if('speechSynthesis'in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text,opts){
  opts=opts||{};
  if(muted||!('speechSynthesis'in window)||!text)return;
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; if(enVoice)u.voice=enVoice; u.rate=opts.rate||0.9; u.pitch=opts.pitch||1.05;
    speechSynthesis.speak(u);
  }catch(e){}
}
function stopSpeak(){ if('speechSynthesis'in window)speechSynthesis.cancel(); }
/* phoneme approximations so letter sounds are read, not letter names */
const PH={a:"aah",e:"eh",i:"ih",o:"awe",u:"uh",b:"buh",c:"kuh",d:"duh",f:"fff",g:"guh",h:"huh",
  j:"juh",k:"kuh",l:"lll",m:"mmm",n:"nnn",p:"puh",q:"kwuh",r:"rrr",s:"sss",t:"tuh",v:"vvv",
  w:"wuh",x:"ks",y:"yuh",z:"zzz",sh:"shh",ch:"chuh",th:"th",ll:"lll",ck:"kuh",ee:"eee",
  air:"air",ar:"ar",ai:"ay",oo:"oo",mb:"mmm",se:"ss",ss:"sss",fr:"fr",fl:"fl",cl:"cl",cr:"cr",
  dr:"dr",st:"st",gl:"gl",sn:"sn",tr:"tr",sw:"sw",pl:"pl"};
function phon(s){ return PH[s.toLowerCase()]||s; }

/* ===================== HELPERS ===================== */
const $=id=>document.getElementById(id);
const elc=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
function show(s){ ["homeScreen","menuScreen","actScreen","parentScreen"].forEach(x=>$(x).classList.add("hidden")); $(s).classList.remove("hidden"); $(s).scrollTop=0; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1500); }
function todayKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function cheer(){ return CHEERS[Math.floor(Math.random()*CHEERS.length)]; }
function logDay(){ const k=todayKey(); state.log[k]=(state.log[k]||0)+1; }
function markSeen(label){ if(label) state.seen[label]=1; }
function bumpStat(id,correct){ const s=state.stats[id]||(state.stats[id]={a:0,c:0,sess:0}); s.a++; if(correct)s.c++; }

/* ===================== REWARD / FIELD ===================== */
function addStars(n){
  state.stars+=n;
  for(let i=0;i<n;i++){ state.basePos++; if(state.basePos>=4){ state.basePos=0; scoreRun(); } }
  saveState(); renderTop();
}
function scoreRun(){ state.runs++; const t=TEAM[(state.runs-1)%TEAM.length]; state.team.push(t); }
function renderTop(){ $("starCount").textContent=state.stars; $("runCount").textContent=state.runs; }
function renderField(){
  $("scoreBox").textContent=state.runs+(state.runs===1?" run":" runs");
  const bases=["b1","b2","b3","bH"];
  bases.forEach((b,i)=>$(b).classList.toggle("lit", i<state.basePos));
  // runner position along the path
  const pos=[{l:"100%",b:"50%"},{l:"50%",b:"100%"},{l:"0%",b:"50%"},{l:"50%",b:"0%"}];
  const p=pos[Math.min(state.basePos, 3)] || pos[0];
  const r=$("runner");
  if(state.basePos===0){ r.style.left="50%"; r.style.bottom="-4px"; }
  else { r.style.left=p.l; r.style.bottom=p.b; }
  $("fieldNote").textContent = state.runs===0 && state.basePos===0
    ? "Play a game to start running the bases! 🏃"
    : `${state.basePos}/4 to your next run — ${state.runs} scored! ⚾`;
  const tr=$("teamRow"); tr.innerHTML="";
  state.team.slice(-12).forEach(m=>{ const d=elc("div","mate"); d.textContent=m; tr.appendChild(d); });
}

/* ===================== SKILL OF THE DAY ===================== */
const ALL_PHON = TOPICS.filter(t=>t.type==="phonics").reduce((a,t)=>a.concat(t.items.map(w=>({w:w.word,ic:w.ic||"⭐",lab:w.label||""}))),[]);
function renderWOTD(){
  const day=Math.floor((Date.now()-new Date().getTimezoneOffset()*6e4)/864e5);
  const w=ALL_PHON[day%ALL_PHON.length];
  const e=$("wotd");
  e.innerHTML=`<div class="tag">🌅 Word of the Day</div>
    <div class="row"><span class="wic">${w.ic}</span>
    <span><span class="ww">${w.w}</span><br><span class="wl">${w.lab||"say it out loud"}</span></span>
    <span class="hear">🔊</span></div>`;
  e.onclick=()=>speak(w.w);
}

/* ===================== HOME ===================== */
function topicCount(t){ return t.items ? t.items.length : (t.count||6); }
function topicProgress(t){
  const s=state.stats[t.id]||{a:0,c:0};
  const target=topicCount(t);
  const done=Math.min(target, s.c);
  return Math.round(done/target*100);
}
const SECTIONS=[
  {key:"reading", label:"📖 Reading", ids:["letters","cvc_a","cvc_e","cvc_i","cvc_o","cvc_u","digraphs","blends","sight1","sight2","stories"]},
  {key:"math", label:"🔢 Math", ids:["add","sub"]},
  {key:"talking", label:"💬 Talking", ids:["comm_want","comm_comment","comm_problem","comm_social","directions"]},
  {key:"feelings", label:"😊 Feelings", ids:["feelings"]},
  {key:"convos", label:"🎭 Conversations", scripts:true},
];
let activeSection="reading";
function renderTabs(){
  const tb=$("tabBar"); tb.innerHTML="";
  SECTIONS.forEach(s=>{
    const b=elc("button","tab"+(s.key===activeSection?" on":""));
    b.textContent=s.label;
    b.onclick=()=>{ activeSection=s.key; renderTabs(); renderTiles(); $("homeScreen").scrollTop=0; };
    tb.appendChild(b);
  });
}
function renderTiles(){
  const wrap=$("sections"); wrap.innerHTML="";
  const sec=SECTIONS.find(s=>s.key===activeSection)||SECTIONS[0];
  if(sec.scripts){
    SCRIPTS.forEach(sc=>{
      const b=elc("button","unit c-sun"); b.onclick=()=>playScript(sc.id);
      const done=state.done["script_"+sc.id]?'<div class="prog">⭐ Practiced</div>':'<div class="prog">Act it out</div>';
      b.innerHTML=`<span class="emoji">${sc.emoji}</span><span class="name">${sc.name}</span>${done}`;
      wrap.appendChild(b);
    });
  } else {
    sec.ids.forEach(id=>{
      const t=TOPICS.find(x=>x.id===id); if(!t)return;
      const pct=topicProgress(t);
      const b=elc("button","unit c-"+(t.color||"blue")); b.onclick=()=>openTopic(t.id);
      b.innerHTML=`<span class="emoji">${t.emoji}</span><span class="name">${t.name}</span>
        ${pct>=100?'<div class="prog">⭐ All-Star!</div>':`<div class="prog">${pct}% done</div>`}
        <div class="bar"><i style="width:${pct}%"></i></div>`;
      wrap.appendChild(b);
    });
  }
}
function renderHome(){ renderTabs(); renderTiles(); }
function goHome(){ stopSpeak(); currentTopic=null; $("topbar").classList.remove("hidden"); renderTop(); renderField(); renderWOTD(); renderHome(); show("homeScreen"); }

/* ===================== LANDING ===================== */
function showLanding(){ stopSpeak(); $("topbar").classList.add("hidden"); ["homeScreen","menuScreen","actScreen","parentScreen"].forEach(x=>$(x).classList.add("hidden")); $("landingScreen").classList.remove("hidden"); }
function startApp(){ $("landingScreen").classList.add("hidden"); $("topbar").classList.remove("hidden"); goHome(); }

/* ===================== TOPIC MENU ===================== */
const ACTIVITY_SETS={
  phonics:[{k:"learn",big:"📖",t:"Learn the Words",d:"See, hear & sound it out"},
           {k:"find",big:"👂",t:"Listen & Find",d:"Hear it, tap the right one"},
           {k:"say",big:"🎤",t:"Say It!",d:"Hear it, then record yourself"}],
  comm:[{k:"learn",big:"📖",t:"Learn the Phrase",d:"See the picture, hear the words"},
        {k:"choose",big:"💬",t:"What Do I Say?",d:"Pick the phrase that fits"},
        {k:"say",big:"🎤",t:"Say It!",d:"Hear it, then record yourself"}],
  math:[{k:"sticks",big:"🟦",t:"Count with Blocks",d:"Tap to add or take away"},
        {k:"numberline",big:"📏",t:"Number Line",d:"Hop the frog to the answer"},
        {k:"quiz",big:"⚡",t:"Quick Quiz",d:"Pick the answer"}],
  read:[{k:"read",big:"📚",t:"Read & Answer",d:"Listen to a story, answer who & what"}],
  directions:[{k:"do",big:"👂",t:"Listen & Do",d:"Do what you hear"}],
  feelings:[{k:"feel",big:"😊",t:"Name the Feeling",d:"How do they feel? Then get calm"}],
};
function openTopic(id){
  currentTopic=id; const t=TOPICS.find(x=>x.id===id);
  const ms=$("menuScreen");
  ms.innerHTML=`<button class="backBtn" id="menuBack">⬅️ Field</button>
    <h1 style="margin-top:10px">${t.emoji} ${t.name}</h1>
    <div class="sub">${topicCount(t)} to practice • your pace, no rush</div>
    <div id="menuActs" style="margin-top:6px"></div>`;
  ms.querySelector("#menuBack").onclick=goHome;
  const m=ms.querySelector("#menuActs");
  (ACTIVITY_SETS[t.type]||[]).forEach(a=>{
    const b=elc("button","actBtn"); b.onclick=()=>startActivity(id,a.k);
    const tick=state.done[id+"_"+a.k]?" ✓":"";
    b.innerHTML=`<span class="big">${a.big}</span><span><span class="t">${a.t}${tick}</span><br><span class="d">${a.d}</span></span>`;
    m.appendChild(b);
  });
  show("menuScreen");
}

/* ===================== ACTIVITY ENGINE ===================== */
function startActivity(id,kind){
  const t=TOPICS.find(x=>x.id===id);
  const items = t.type==="math"
    ? Array.from({length:t.count||6},()=>genMath(t.op,t.max||10))
    : shuffle(t.items);
  lesson={id,kind,type:t.type,items,idx:0,correct:0,topic:t};
  const s=state.stats[id]||(state.stats[id]={a:0,c:0,sess:0}); s.sess++; saveState();
  renderDots(); renderStep(); show("actScreen");
}
function renderDots(){
  const d=$("dots"); d.innerHTML="";
  lesson.items.forEach((_,i)=>{ const s=elc("div","dot"+(i<lesson.idx?" done":i===lesson.idx?" now":"")); d.appendChild(s); });
}
function nextStep(){
  lesson.idx++;
  if(lesson.idx>=lesson.items.length){ return finishActivity(); }
  renderDots(); renderStep();
}
function renderStep(){
  const k=lesson.kind;
  if(lesson.type==="phonics"){ k==="learn"?rLearnPhon():k==="find"?rFindPhon():rSay(phonItemText()); }
  else if(lesson.type==="comm"){ k==="learn"?rLearnComm():k==="choose"?rChooseComm():rSay(lesson.items[lesson.idx].say); }
  else if(lesson.type==="read"){ rRead(); }
  else if(lesson.type==="directions"){ rDirections(); }
  else if(lesson.type==="feelings"){ rFeelings(); }
  else if(lesson.type==="math"){ renderMath(); }
}
function coachHTML(text){
  return `<div class="coach"><span class="face">🦉</span><span class="bubble">${text}</span><button class="listen" id="listenBtn">🔊 Listen</button></div>`;
}
function bindListen(fn){ const b=$("listenBtn"); if(b) b.onclick=fn; }

/* ---- PHONICS: Learn ---- */
function rLearnPhon(){
  const w=lesson.items[lesson.idx], body=$("actBody");
  if(w.sight){
    body.innerHTML=coachHTML("Look and listen. This word is &ldquo;"+w.word+"&rdquo;.")+
      `<div class="card"><div class="bigword">${w.word}</div>
       <button class="speakBtn" id="hb">🔊 Hear it</button></div>
       <button class="footerBtn" id="nx">Got it! ⭐</button>`;
    $("hb").onclick=()=>speak(w.word);
    bindListen(()=>speak("This word is "+w.word));
    speak("This word is "+w.word);
  } else {
    const sndHTML=w.sounds.map(s=>`<button class="sbtn" data-s="${s}">${s}</button>`).join("");
    body.innerHTML=coachHTML("Tap each sound. Then blend them together.")+
      `<div class="card"><div class="bigEmoji">${w.ic||"⭐"}</div>
        <div class="sounds">${sndHTML}</div>
        <div class="bigword">${w.word}</div>
        ${w.label?`<div class="label">${w.label}</div>`:""}
        <button class="speakBtn" id="blend">🔊 Blend it: ${w.word}</button></div>
       <button class="footerBtn" id="nx">Got it! ⭐</button>`;
    body.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>{ b.classList.add("lit"); speak(phon(b.dataset.s),{rate:.75}); setTimeout(()=>b.classList.remove("lit"),450); });
    $("blend").onclick=()=>speak(w.sounds.map(phon).join(" ")+" ... "+w.word,{rate:.8});
    bindListen(()=>speak("Sound it out. "+w.sounds.map(phon).join(". ")+". "+w.word));
    speak("Sound it out. "+w.word);
  }
  $("nx").onclick=()=>{ bumpStat(lesson.id,true); lesson.correct++; markSeen(w.word); nextStep(); };
}

/* ---- PHONICS: Listen & Find ---- */
function rFindPhon(){
  const w=lesson.items[lesson.idx], body=$("actBody");
  const others=shuffle(lesson.topic.items.filter(x=>x.word!==w.word)).slice(0,3);
  const opts=shuffle([w,...others]);
  if(w.sight){
    body.innerHTML=coachHTML("Listen, then tap the word you hear.")+
      `<div class="card" style="padding:14px"><button class="speakBtn" id="play">🔊 Play the word</button></div>
       <div class="options" id="opts"></div><div class="encourage" id="enc"></div>`;
    const o=$("opts");
    opts.forEach(op=>{ const b=elc("button","opt txt"); b.textContent=op.word;
      b.onclick=()=>judge(b,op.word===w.word,o,()=>speak(w.word),()=>hintText(o,w.word)); o.appendChild(b); });
    $("play").onclick=()=>speak(w.word);
    bindListen(()=>speak("Tap the word: "+w.word)); speak("Tap the word: "+w.word);
  } else {
    body.innerHTML=coachHTML("Listen, then tap the right picture.")+
      `<div class="card" style="padding:14px"><button class="speakBtn" id="play">🔊 Play the word</button></div>
       <div class="options" id="opts"></div><div class="encourage" id="enc"></div>`;
    const o=$("opts");
    opts.forEach(op=>{ const b=elc("button","opt"); b.innerHTML=`${op.ic||"⭐"}<span class="lab">${op.word}</span>`;
      b.onclick=()=>judge(b,op.word===w.word,o,()=>speak(w.word),()=>hintPic(o,w.ic)); o.appendChild(b); });
    $("play").onclick=()=>speak(w.word);
    bindListen(()=>speak("Tap the picture for "+w.word)); speak("Find "+w.word);
  }
}
function phonItemText(){ return lesson.items[lesson.idx].word; }

/* ---- COMM: Learn ---- */
function rLearnComm(){
  const it=lesson.items[lesson.idx], body=$("actBody");
  body.innerHTML=coachHTML(it.coach)+
    `<div class="card"><div class="scene">${it.scene}</div>
      <div class="storyText">&ldquo;${it.say}&rdquo;</div>
      <button class="speakBtn" id="hb">🔊 Hear it</button></div>
     <button class="footerBtn" id="nx">Got it! ⭐</button>`;
  $("hb").onclick=()=>speak(it.say,{rate:.85});
  bindListen(()=>speak(it.coach+" You can say: "+it.say));
  speak(it.coach+" You can say: "+it.say,{rate:.88});
  $("nx").onclick=()=>{ bumpStat(lesson.id,true); lesson.correct++; markSeen(it.say); nextStep(); };
}

/* ---- COMM: Choose ---- */
function rChooseComm(){
  const it=lesson.items[lesson.idx], body=$("actBody");
  body.innerHTML=coachHTML(it.coach)+
    `<div class="card" style="padding:16px"><div class="scene">${it.scene}</div>
      <div class="prompt">Tap what you can say 💬</div></div>
     <div class="options" id="opts" style="grid-template-columns:1fr"></div><div class="encourage" id="enc"></div>`;
  const o=$("opts");
  shuffle(it.choices).forEach(txt=>{
    const b=elc("button","opt txt"); b.style.fontSize="19px"; b.textContent=txt;
    b.onclick=()=>{ const ok=txt===it.say; if(ok)speak(it.say,{rate:.85});
      judge(b,ok,o,()=>speak(it.say),()=>hintText(o,it.say)); };
    o.appendChild(b);
  });
  bindListen(()=>speak(it.coach)); speak(it.coach,{rate:.88});
}

/* ---- READ ---- */
function rRead(){
  const it=lesson.items[lesson.idx], body=$("actBody");
  const readAll=()=>speak(it.text+" ... "+it.q,{rate:.86});
  body.innerHTML=coachHTML("Listen to the story. Then answer.")+
    `<div class="card"><div class="scene">${it.scene}</div>
      <div class="storyText">${it.text}</div>
      <button class="speakBtn" id="hb">🔊 Hear the story</button>
      <div class="prompt" style="margin-top:14px;font-size:18px;color:var(--ink)">❓ ${it.q}</div></div>
     <div class="options" id="opts"></div><div class="encourage" id="enc"></div>`;
  $("hb").onclick=readAll;
  const o=$("opts");
  shuffle([it.answer,...it.distractors]).forEach(op=>{
    const b=elc("button","opt"); b.innerHTML=`${op.ic}<span class="lab">${op.label}</span>`;
    b.onclick=()=>judge(b,op.label===it.answer.label,o,()=>speak(it.answer.label),()=>{hintText(o,it.answer.label);speak("Look back at the story. "+it.answer.label);});
    o.appendChild(b);
  });
  bindListen(readAll); setTimeout(readAll,350);
  markSeen("story");
}

/* ---- DIRECTIONS ---- */
function rDirections(){
  const it=lesson.items[lesson.idx], body=$("actBody");
  lesson._dirStep=0; lesson._dirTargets=it.target.slice();
  body.innerHTML=coachHTML("Listen, then do it.")+
    `<div class="card" style="padding:14px"><div class="prompt" style="font-size:18px;color:var(--ink)">${it.ask}</div>
      <button class="speakBtn" id="hb">🔊 Say it again</button></div>
     <div class="options" id="opts">${shuffle(it.pool).map(e=>`<button class="opt" data-e="${e}">${e}</button>`).join("")}</div>
     <div class="encourage" id="enc"></div>`;
  $("hb").onclick=()=>speak(it.ask,{rate:.85});
  const o=$("opts");
  o.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    const want=lesson._dirTargets[lesson._dirStep];
    if(b.dataset.e===want){
      b.classList.add("correct"); b.style.pointerEvents="none"; lesson._dirStep++;
      if(lesson._dirStep>=lesson._dirTargets.length){
        bumpStat(lesson.id,true); lesson.correct++; $("enc").textContent=cheer(); speak(cheer());
        o.querySelectorAll(".opt").forEach(x=>x.style.pointerEvents="none"); setTimeout(nextStep,800);
      } else { $("enc").textContent="Good! Now the next one 👍"; speak("Good! Now the next one."); }
    } else {
      b.classList.add("wrong"); bumpStat(lesson.id,false);
      $("enc").textContent="Almost! Listen again 🌟"; speak(it.ask,{rate:.8});
      setTimeout(()=>b.classList.remove("wrong"),700);
    }
  });
  bindListen(()=>speak(it.ask,{rate:.85})); speak(it.ask,{rate:.85});
}

/* ---- FEELINGS ---- */
function rFeelings(){
  const it=lesson.items[lesson.idx], body=$("actBody");
  body.innerHTML=coachHTML(it.text+" How do they feel?")+
    `<div class="card" style="padding:16px"><div class="scene">${it.scene}</div>
      <div class="storyText">${it.text}</div></div>
     <div class="options" id="opts"></div><div class="encourage" id="enc"></div>`;
  const o=$("opts");
  shuffle([it.feeling,...it.distract]).forEach(op=>{
    const b=elc("button","opt"); b.innerHTML=`${op.face}<span class="lab">${op.label}</span>`;
    b.onclick=()=>{
      if(op.label===it.feeling.label){ bumpStat(lesson.id,true); lesson.correct++; markSeen("feeling:"+it.feeling.label);
        o.querySelectorAll(".opt").forEach(x=>x.style.pointerEvents="none"); b.classList.add("correct");
        speak("Yes! They feel "+it.feeling.label+". That is okay. Let's get calm."); setTimeout(calmStep,1000);
      } else { b.classList.add("wrong"); b.dataset.locked=1; bumpStat(lesson.id,false);
        $("enc").textContent="Look at the face 🌟"; hintText(o,it.feeling.label); speak("Look at the face. They might feel "+it.feeling.label); }
    };
    o.appendChild(b);
  });
  bindListen(()=>speak(it.text+" How do they feel?")); speak(it.text+" How do they feel?",{rate:.88});
}
function calmStep(){
  const body=$("actBody");
  body.innerHTML=coachHTML("Pick something to feel calm.")+`<div class="options" id="opts"></div><div id="extra"></div>`;
  const o=$("opts");
  CALM.forEach(c=>{
    const b=elc("button","opt"); b.innerHTML=`${c.emoji}<span class="lab">${c.label}</span>`;
    b.onclick=()=>{
      o.querySelectorAll(".opt").forEach(x=>x.style.pointerEvents="none"); b.classList.add("correct");
      if(c.breathe){ $("extra").innerHTML=`<div class="breathe">Breathe…</div>`; speak("Breathe in... and out... in... and out... in... and out.",{rate:.78});
        setTimeout(()=>nextStep(),5000);
      } else { speak("Good choice. "+c.label+". You feel calm."); setTimeout(()=>nextStep(),900); }
    };
    o.appendChild(b);
  });
  bindListen(()=>speak("Pick something to feel calm.")); speak("Pick something to feel calm.");
}

/* ---- SAY IT (record) ---- */
let mediaRec=null, recChunks=[], recURL=null;
function rSay(text){
  const it=lesson.items[lesson.idx], body=$("actBody");
  const pic = it.ic || it.scene || "🎤";
  body.innerHTML=coachHTML("Hear it, then say it out loud!")+
    `<div class="card"><div class="scene">${pic}</div>
      <div class="storyText">&ldquo;${text}&rdquo;</div>
      <button class="speakBtn" id="hb">🔊 Hear it</button>
      <div class="recRow">
        <button class="recBtn rec" id="recBtn">🎤 Record me</button>
        <button class="recBtn play" id="playBtn" disabled>▶️ Play mine</button>
      </div>
      <div class="note" id="recNote" style="margin-top:8px"></div></div>
     <button class="footerBtn alt" id="nx">I said it! 🎉</button>`;
  $("hb").onclick=()=>speak(text,{rate:.85});
  bindListen(()=>speak("Say: "+text)); speak(text,{rate:.85});
  setupRecord(text);
  $("nx").onclick=()=>{ bumpStat(lesson.id,true); lesson.correct++; markSeen(text); stopRec(); nextStep(); };
}
function setupRecord(text){
  const recBtn=$("recBtn"), playBtn=$("playBtn"), note=$("recNote");
  if(!navigator.mediaDevices||!window.MediaRecorder){ recBtn.disabled=true; recBtn.style.opacity=.4; note.textContent="(Recording needs microphone permission — you can still practice by saying it out loud.)"; return; }
  let recording=false;
  recBtn.onclick=async()=>{
    if(!recording){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        recChunks=[]; mediaRec=new MediaRecorder(stream);
        mediaRec.ondataavailable=e=>{ if(e.data.size)recChunks.push(e.data); };
        mediaRec.onstop=()=>{ if(recURL)URL.revokeObjectURL(recURL); recURL=URL.createObjectURL(new Blob(recChunks)); playBtn.disabled=false; stream.getTracks().forEach(t=>t.stop()); };
        mediaRec.start(); recording=true; recBtn.classList.add("on"); recBtn.textContent="⏹️ Stop"; note.textContent="Listening… say it now!";
      }catch(e){ note.textContent="(Microphone not allowed. You can still say it out loud!)"; recBtn.disabled=true; recBtn.style.opacity=.4; }
    } else { stopRec(); recBtn.classList.remove("on"); recBtn.textContent="🎤 Record me"; recording=false; note.textContent="Nice! Tap ▶️ to hear yourself."; }
  };
  playBtn.onclick=()=>{ if(recURL){ stopSpeak(); new Audio(recURL).play(); } };
}
function stopRec(){ try{ if(mediaRec&&mediaRec.state!=="inactive")mediaRec.stop(); }catch(e){} }

/* ===================== MATH ===================== */
function rand(n){ return Math.floor(Math.random()*n); }
function genMath(op,max){
  if(op==="sub"){ const a=2+rand(max-1); const b=1+rand(a-1); return {a,b,op:"sub",ans:a-b}; }
  const a=1+rand(max-1); const b=1+rand(max-a); return {a,b,op:"add",ans:a+b};
}
function makeNumChoices(ans,top){
  const set=new Set([ans]);
  for(const c of shuffle([ans+1,ans-1,ans+2,ans-2,ans+3,ans-3])){ if(set.size>=3)break; if(c>=0&&c<=top+3&&c!==ans) set.add(c); }
  while(set.size<3){ const r=rand(top+2); if(r!==ans) set.add(r); }
  return shuffle([...set]);
}
function makeBlock(cls){ const b=elc("button","counter "+cls); return b; }
function mathSeen(it){ markSeen((it.op==="add"?"➕ ":"➖ ")+it.a+(it.op==="add"?"+":"−")+it.b); }
function answerNum(btn,chosen,it,container){
  if(btn.dataset.locked)return;
  if(chosen===it.ans){
    btn.classList.add("correct"); container.querySelectorAll(".numBtn").forEach(b=>b.dataset.locked=1);
    lesson.correct++; bumpStat(lesson.id,true); mathSeen(it);
    const enc=$("enc"); if(enc)enc.textContent=cheer(); speak(cheer());
    setTimeout(nextStep,950);
  } else {
    btn.classList.add("wrong"); btn.dataset.locked=1; bumpStat(lesson.id,false);
    const enc=$("enc"); if(enc)enc.textContent="Try again — count carefully! 🌟";
  }
}

function renderMath(){
  const it=lesson.items[lesson.idx], k=lesson.kind;
  if(k==="numberline") return rMathLine(it);
  if(k==="quiz") return rMathQuiz(it);
  return rMathSticks(it);
}

/* ---- Blocks / sticks: tap to count (add) or take away (sub) ---- */
function rMathSticks(it){
  const add=it.op==="add", body=$("actBody");
  const coachTxt = add
    ? `Let's add ${it.a} plus ${it.b}. Tap each block to count them all.`
    : `You have ${it.a}. Take away ${it.b}. Tap ${it.b} blocks to take them away.`;
  body.innerHTML = coachHTML(coachTxt)+
    `<div class="card mathCard">
      <div class="mathEq">${it.a} ${add?'+':'–'} ${it.b} = <span class="qm">?</span></div>
      <div class="counters" id="counters"></div>
      <div class="countTotal" id="ctot"></div>
      <button class="btnMini" id="auto">${add?'👀 Count for me':'👀 Show me'}</button>
      <div class="prompt" id="mprompt">${add?'How many altogether?':'How many are left?'}</div>
      <div class="numChoices" id="opts"></div>
      <div class="encourage" id="enc"></div>
    </div>`;
  const counters=$("counters");
  if(add){
    for(let i=0;i<it.a;i++) counters.appendChild(makeBlock("g1"));
    const plus=elc("div","plusSign"); plus.textContent="+"; counters.appendChild(plus);
    for(let i=0;i<it.b;i++) counters.appendChild(makeBlock("g2"));
  } else {
    for(let i=0;i<it.a;i++) counters.appendChild(makeBlock("g1"));
  }
  const blocks=[...counters.querySelectorAll(".counter")];
  const tot=$("ctot"); let n=0;
  tot.textContent = add ? "Counted: 0" : "Left: "+it.a;
  blocks.forEach(b=>b.onclick=()=>{
    if(add){ if(b.dataset.c)return; b.dataset.c=1; b.classList.add("counted"); n++; speak(String(n)); tot.textContent="Counted: "+n; }
    else { if(b.dataset.g)return; if(n>=it.b)return; b.dataset.g=1; b.classList.add("gone"); n++; speak("take away"); tot.textContent="Left: "+(it.a-n); }
  });
  $("auto").onclick=()=>{
    let i=0;
    const step=()=>{
      if(add){ if(i>=blocks.length)return; const b=blocks[i]; if(!b.dataset.c){b.dataset.c=1;b.classList.add("counted");} i++; speak(String(i)); tot.textContent="Counted: "+i; if(i<blocks.length)setTimeout(step,620); }
      else { if(i>=it.b)return; const b=blocks[i]; b.dataset.g=1; b.classList.add("gone"); i++; speak("take away"); tot.textContent="Left: "+(it.a-i); if(i<it.b)setTimeout(step,620); }
    };
    step();
  };
  const opts=$("opts");
  makeNumChoices(it.ans, add?(it.a+it.b):it.a).forEach(v=>{
    const btn=elc("button","numBtn"); btn.textContent=v; btn.onclick=()=>answerNum(btn,v,it,opts); opts.appendChild(btn);
  });
  bindListen(()=>speak(coachTxt)); speak(coachTxt,{rate:.9});
}

/* ---- Number line: hop a frog forward (add) or back (sub) ---- */
function paintLine(span,pos){
  const nl=$("nl"); nl.innerHTML="";
  for(let i=0;i<=span;i++){
    const c=elc("div","nlcell"+(i===pos?" here":""));
    c.innerHTML=`<div class="nlmark">${i===pos?"🐸":""}</div><div class="nltick"></div><div class="nlnum">${i}</div>`;
    nl.appendChild(c);
  }
}
function rMathLine(it){
  const add=it.op==="add", body=$("actBody");
  const span=Math.max(add?(it.a+it.b):it.a, 10);
  let pos=it.a, hops=0;
  const coachTxt = add ? `Start at ${it.a}. Hop forward ${it.b} times!` : `Start at ${it.a}. Hop back ${it.b} times!`;
  body.innerHTML = coachHTML(coachTxt)+
    `<div class="card">
      <div class="mathEq">${it.a} ${add?'+':'–'} ${it.b} = <span class="qm">?</span></div>
      <div class="numline" id="nl"></div>
      <div class="prompt">Hops: <b id="hopn">0</b> / ${it.b}</div>
      <button class="footerBtn ${add?'':'alt'}" id="hopBtn">${add?'➡️ Hop forward':'⬅️ Hop back'}</button>
      <div class="encourage" id="enc"></div>
    </div>`;
  paintLine(span,pos);
  $("hopBtn").onclick=()=>{
    if(hops>=it.b) return;
    hops++; pos += add?1:-1; speak(String(pos));
    paintLine(span,pos); $("hopn").textContent=hops;
    if(hops>=it.b){
      $("hopBtn").disabled=true;
      lesson.correct++; bumpStat(lesson.id,true); mathSeen(it);
      const msg=`We landed on ${pos}! ${it.a} ${add?'plus':'minus'} ${it.b} is ${pos}.`;
      $("enc").textContent=`🎉 ${it.a} ${add?'+':'–'} ${it.b} = ${pos}`;
      speak(msg);
      setTimeout(nextStep,1500);
    }
  };
  bindListen(()=>speak(coachTxt)); speak(coachTxt,{rate:.9});
}

/* ---- Quick quiz: equation + small visual support + number choices ---- */
function rMathQuiz(it){
  const add=it.op==="add", body=$("actBody");
  body.innerHTML = coachHTML("What is the answer?")+
    `<div class="card">
      <div class="mathEq big">${it.a} ${add?'+':'–'} ${it.b} = ?</div>
      <div class="counters small" id="counters"></div>
      <div class="numChoices" id="opts"></div>
      <div class="encourage" id="enc"></div>
    </div>`;
  const counters=$("counters");
  if(add){
    for(let i=0;i<it.a;i++) counters.appendChild(makeBlock("g1"));
    const plus=elc("div","plusSign"); plus.textContent="+"; counters.appendChild(plus);
    for(let i=0;i<it.b;i++) counters.appendChild(makeBlock("g2"));
  } else {
    for(let i=0;i<it.a;i++){ const b=makeBlock("g1"); if(i>=it.a-it.b)b.classList.add("gone"); counters.appendChild(b); }
  }
  const opts=$("opts");
  makeNumChoices(it.ans, add?(it.a+it.b):it.a).forEach(v=>{
    const btn=elc("button","numBtn"); btn.textContent=v; btn.onclick=()=>answerNum(btn,v,it,opts); opts.appendChild(btn);
  });
  bindListen(()=>speak(`${it.a} ${add?'plus':'minus'} ${it.b}. What is the answer?`));
  speak(`${it.a} ${add?'plus':'minus'} ${it.b}`,{rate:.9});
}

/* ---- judge (shared for choice activities) ---- */
function judge(btn,correct,container,sayOk,hintFn){
  if(btn.dataset.locked)return;
  if(correct){
    btn.classList.add("correct"); lesson.correct++; bumpStat(lesson.id,true);
    container.querySelectorAll(".opt").forEach(c=>c.dataset.locked=1);
    const enc=$("enc"); if(enc)enc.textContent=cheer(); if(sayOk)sayOk();
    setTimeout(nextStep,850);
  } else {
    btn.classList.add("wrong"); btn.dataset.locked=1; bumpStat(lesson.id,false);
    const enc=$("enc"); if(enc)enc.textContent="Try again — you can do it! 🌟";
    lesson._wrong=(lesson._wrong||0)+1; if(lesson._wrong>=2 && hintFn) hintFn();
  }
}
function hintPic(container,ic){ container.querySelectorAll(".opt").forEach(c=>{ const lab=c.querySelector(".lab"); if(c.textContent.includes(ic)) c.classList.add("hint"); }); }
function hintText(container,txt){ container.querySelectorAll(".opt").forEach(c=>{ if(c.textContent.trim()===txt.trim()||c.textContent.trim().includes(txt.trim())) c.classList.add("hint"); }); }

/* ---- finish ---- */
function finishActivity(){
  lesson._wrong=0;
  const earned=Math.max(2,lesson.correct);
  state.done[lesson.id+"_"+lesson.kind]=(state.done[lesson.id+"_"+lesson.kind]||0)+1;
  logDay(); addStars(earned); showReward(earned);
}

/* ===================== SCRIPTS ===================== */
function playScript(id){
  const sc=SCRIPTS.find(x=>x.id===id); currentTopic=null;

    <h1 style="margin-top:10px">${sc.emoji} ${sc.name}</h1>

/* ===================== REWARD OVERLAY ===================== */
function showReward(earned){
  saveState(); renderTop();
  const ov=elc("div","overlay");
  const scored = state.basePos===0; // just crossed home
  ov.innerHTML=`<div class="rewardCard">
    <div class="grow">${scored?"⚾":"⭐"}</div>

  </div>`;

  burstConfetti();

function burstConfetti(){
  const ems=["⭐","⚾","🎉","🌟","🏆","💫"];
  for(let i=0;i<22;i++){ const c=elc("div","confetti"); c.textContent=ems[i%ems.length];
    c.style.left=Math.random()*100+"vw"; c.style.animationDuration=(1.5+Math.random()*1.8)+"s"; c.style.fontSize=(18+Math.random()*20)+"px";
    document.body.appendChild(c); setTimeout(()=>c.remove(),3400); }
}

/* ===================== PARENT ===================== */
function openParentGate(){
  const a=2+Math.floor(Math.random()*8), b=3+Math.floor(Math.random()*7), ans=a*b;
  const wrongs=new Set(); while(wrongs.size<2){ const d=ans+(Math.floor(Math.random()*9)-4); if(d!==ans&&d>0)wrongs.add(d); }
  const opts=shuffle([ans,...wrongs]);
  const ov=elc("div","overlay");
  ov.innerHTML=`<div class="rewardCard"><div style="font-size:44px">🔒</div>
    <h2 style="font-size:21px">Grown-ups only</h2>
    <div style="font-weight:900;font-size:20px;margin:8px 0">What is ${a} × ${b}?</div>
    <div class="options" style="grid-template-columns:1fr 1fr 1fr">${opts.map(o=>`<button class="opt txt" data-v="${o}">${o}</button>`).join("")}</div>
    <button class="backBtn" style="margin-top:14px" id="gCancel">Cancel</button></div>`;
  document.body.appendChild(ov);
  ov.querySelector("#gCancel").onclick=()=>ov.remove();
  ov.querySelectorAll(".opt").forEach(btn=>btn.onclick=()=>{ if(+btn.dataset.v===ans){ov.remove(); openParent();} else btn.classList.add("wrong"); });
}
function openParent(){
  const seen=Object.keys(state.seen).length;
  const sessions=Object.values(state.log).reduce((a,b)=>a+b,0);
  let rowsHTML="", totA=0, totC=0;
  TOPICS.forEach(t=>{ const s=state.stats[t.id]; if(!s||!s.a)return; totA+=s.a; totC+=s.c;
    const acc=Math.round(100*s.c/s.a);
    rowsHTML+=`<tr><td>${t.emoji} ${t.name}</td><td>${s.sess||0}</td><td>${s.a}</td><td>${s.c}</td>
      <td style="min-width:90px"><div class="pbar"><i style="width:${acc}%"></i></div><div class="note">${acc}%</div></td></tr>`; });
  if(!rowsHTML) rowsHTML=`<tr><td colspan="5" class="note">No activities played yet — pick a game together!</td></tr>`;
  const overallAcc=totA?Math.round(100*totC/totA):0;
  let cal="",active=0;
  for(let i=13;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const k=todayKey(d); const on=state.log[k]; if(on)active++;
    cal+=`<div class="day"><div class="box ${on?'on':''}">${on?'⭐':''}</div><div class="dl">${d.getDate()}</div></div>`; }
  const chips=Object.keys(state.seen).slice(-24).map(s=>`<span class="chip">${s.replace('feeling:','😊 ')}</span>`).join("")||'<span class="note">Nothing yet.</span>';
  const vs=('speechSynthesis'in window)?speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang)).slice(0,6):[];
  const vHTML=vs.length?vs.map(v=>`<button class="vbtn ${state.voice===v.name?'on':''}" data-v="${v.name}">${v.name.replace(/Microsoft|Google|Apple/,'').trim().slice(0,20)}</button>`).join(""):'<span class="note">Voices load in Chrome/Safari — reopen if empty.</span>';

  $("parentBody").innerHTML=`
    <div class="pcard"><div class="statRow">
      <div class="stat"><div class="n">${seen}</div><div class="l">skills practiced</div></div>
      <div class="stat"><div class="n">${overallAcc}%</div><div class="l">overall accuracy</div></div>
      <div class="stat"><div class="n">${state.runs}</div><div class="l">runs scored ⚾</div></div>
      <div class="stat"><div class="n">${state.stars}</div><div class="l">stars earned ⭐</div></div>
    </div></div>

    <div class="pcard"><div style="font-weight:900;font-size:16px;margin-bottom:4px">Accuracy by skill (for IEP notes)</div>
      <table><tr><th>Skill</th><th>Plays</th><th>Tries</th><th>Right</th><th>Accuracy</th></tr>${rowsHTML}</table></div>

    <div class="pcard"><div style="font-weight:900;font-size:16px">Last 2 weeks</div>
      <div class="note">Richit practiced on <b>${active}</b> ${active===1?'day':'days'}. Every day is a bonus, never a must. 🌟</div>
      <div class="cal">${cal}</div></div>

    <div class="pcard"><div style="font-weight:900;font-size:16px">Skills he's met (${seen})</div>
      <div class="chips">${chips}</div></div>

    <div class="pcard"><div style="font-weight:900;font-size:16px">Voice</div>
      <div class="vrow" id="vrow">${vHTML}</div>
      <div class="note" style="margin-top:6px">Pick the voice Richit likes. Instructions are always read aloud; tap 🔊 to replay.</div></div>

    <div class="pcard"><div style="font-weight:900;font-size:16px">Coaching at home 🏡</div>
      <div class="note">Difficulty never ramps up on its own — Richit replays the same level as long as he likes. If he misses twice, the app gently highlights the answer. Praise effort, not just correct answers. Use today's Word of the Day in a real sentence at dinner. For "My Words," have him <b>say the phrase out loud</b> after the app models it — that's his gestalt-language goal in action.</div></div>

    <button class="footerBtn" id="resetBtn" style="background:#e0697a;box-shadow:0 6px 0 #b34d5d">Reset all progress</button>`;

  $("parentBody").querySelectorAll("#vrow .vbtn").forEach(b=>b.onclick=()=>{ state.voice=b.dataset.v; saveState(); pickVoice(); speak("Hi Richit! This is my voice."); openParent(); });
  $("resetBtn").onclick=()=>{ if(confirm("Reset all of Richit's progress?")){ localStorage.removeItem(SAVE_KEY); state=loadState(); openParent(); } };
  show("parentScreen");
}
